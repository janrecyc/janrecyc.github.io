<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScrapPOS — รับซื้อ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --ink:       #0A0A0F;
  --ink2:      #3A3A4A;
  --ink3:      #8A8A9A;
  --surface:   #F5F5FA;
  --white:     #FFFFFF;
  --primary:   #1A6BFF;
  --primary-d: #0040CC;
  --green:     #00C853;
  --red:       #FF3B30;
  --amber:     #FF9F0A;
  --card-sh:   0 2px 20px rgba(10,10,30,0.07), 0 0 0 0.5px rgba(10,10,30,0.06);
  --card-sh-active: 0 8px 32px rgba(26,107,255,0.18), 0 0 0 1.5px #1A6BFF;
  --r: 20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family: 'Prompt', sans-serif;
  background: var(--surface);
  color: var(--ink);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

.status-bar { height: env(safe-area-inset-top, 0px); background: var(--white); flex-shrink: 0; }

header {
  background: var(--white);
  padding: 14px 20px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(10,10,30,0.06);
}
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.app-logo { display:flex; align-items:center; gap:8px; }
.logo-mark {
  width:32px; height:32px; background:var(--ink); border-radius:9px;
  display:flex; align-items:center; justify-content:center; color:white; font-size:16px;
}
.app-name { font-size:13px; font-weight:700; color:var(--ink3); letter-spacing:2px; text-transform:uppercase; }
.header-actions { display:flex; align-items:center; gap:8px; }
.icon-btn {
  width:36px; height:36px; border-radius:50%; background:var(--surface); border:none;
  display:flex; align-items:center; justify-content:center;
  color:var(--ink2); font-size:18px; cursor:pointer; transition:background .15s;
}
.icon-btn:active{background:#e8e8f0;}
.page-title { font-size:26px; font-weight:800; color:var(--ink); letter-spacing:-0.5px; line-height:1.1; }
.page-sub { font-size:12px; color:var(--ink3); font-weight:400; margin-left:2px; }

.app-body {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}


.catalogue { display:flex; flex-direction:column; overflow:hidden; min-height:0; flex:1; }

.search-area { padding:12px 20px 0; flex-shrink:0; }
.search-field {
  display:flex; align-items:center; gap:10px;
  background:var(--white); border:1px solid rgba(10,10,30,0.08);
  border-radius:14px; padding:10px 14px;
  box-shadow:0 1px 6px rgba(10,10,30,0.05);
  transition:border-color .15s, box-shadow .15s;
}
.search-field:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px rgba(26,107,255,0.12); }
.search-field i { color:var(--ink3); font-size:17px; }
.search-field input {
  flex:1; border:none; outline:none; font-family:'Prompt',sans-serif;
  font-size:14px; color:var(--ink); background:transparent;
}
.search-field input::placeholder{color:var(--ink3);}

.cat-bar {
  display:flex; gap:6px; padding:10px 20px 8px;
  overflow-x:auto; flex-shrink:0; scrollbar-width:none;
}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn {
  flex-shrink:0; padding:6px 16px; border-radius:100px;
  font-family:'Prompt',sans-serif; font-size:13px; font-weight:500;
  border:none; cursor:pointer; transition:all .16s; white-space:nowrap;
}
.cat-btn.on { background:var(--ink); color:white; box-shadow:0 2px 8px rgba(10,10,30,0.2); }
.cat-btn:not(.on) { background:var(--white); color:var(--ink2); border:1px solid rgba(10,10,30,0.08); }
.cat-btn:not(.on):active{background:var(--surface);}

.item-grid-wrap { flex:1; overflow-y:auto; padding:4px 20px 12px; scrollbar-width:none; }
.item-grid-wrap::-webkit-scrollbar{display:none;}
.item-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
@media(min-width:500px){ .item-grid{grid-template-columns:repeat(3,1fr);} }
@media(min-width:900px){ .item-grid{grid-template-columns:repeat(2,1fr);} }
@media(min-width:1100px){ .item-grid{grid-template-columns:repeat(3,1fr);} }

.item-card {
  background:var(--white); border-radius:var(--r); padding:16px 14px 14px;
  cursor:pointer; position:relative; overflow:hidden;
  box-shadow:var(--card-sh); transition:transform .13s, box-shadow .13s;
  user-select:none; -webkit-user-select:none;
  display:flex; flex-direction:column; gap:10px;
  border:1.5px solid transparent;
  min-height:140px;
}
.item-card::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.7) 0%,transparent 50%);
  pointer-events:none;
}
.item-card:active{transform:scale(0.95);}
.item-card.selected { border-color:var(--primary); box-shadow:var(--card-sh-active); }

.card-badge {
  position:absolute; top:10px; right:10px;
  min-width:24px; height:24px; background:var(--primary);
  color:white; border-radius:100px; font-size:11px; font-weight:700;
  display:flex; align-items:center; justify-content:center; padding:0 6px;
  opacity:0; transform:scale(0.6); transition:opacity .18s,transform .18s;
}
.item-card.selected .card-badge { opacity:1; transform:scale(1); }

.card-icon { font-size:34px; line-height:1; display:flex; }
.card-name { font-size:13px; font-weight:600; color:var(--ink); line-height:1.3; }
.card-bottom { display:flex; align-items:flex-end; justify-content:space-between; }
.card-price { font-size:15px; font-weight:700; color:var(--primary); }
.card-price-unit { font-size:11px; font-weight:400; color:var(--ink3); }
.card-add-btn {
  width:30px; height:30px; border-radius:50%; background:var(--primary);
  border:none; color:white; font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:transform .1s, background .15s;
}
.card-add-btn:active{transform:scale(0.85); background:var(--primary-d);}

.grid-loading {
  grid-column:1/-1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  padding:60px 0; color:var(--ink3);
}
.spin { animation:spin .8s linear infinite; }
@keyframes spin{to{transform:rotate(360deg);}}

/* Phosphor icon pill (iOS app-icon style) */
.ph-icon-wrap {
  display:inline-flex; align-items:center; justify-content:center;
  border-radius:14px;
  flex-shrink:0;
}
.card-icon .ph-icon-wrap { border-radius:14px; }

/* BOTTOM NAV */
nav {
  background:var(--white);
  border-top:1px solid rgba(10,10,30,0.06);
  flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-row { display:flex; }
.nav-tab {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; padding:8px 4px 6px; text-decoration:none;
  color:var(--ink3); font-size:10px; font-weight:500;
  position:relative; transition:color .15s;
}
.nav-tab.on { color:var(--primary); }
.nav-tab i { font-size:20px; }
.nav-tab-indicator {
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:0; height:2px; background:var(--primary); border-radius:0 0 2px 2px;
  transition:width .2s;
}
.nav-tab.on .nav-tab-indicator { width:24px; }

/* TOAST */
#toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(10,10,30,0.88); color:white;
  padding:10px 20px; border-radius:100px;
  font-size:13px; font-weight:500;
  opacity:0; transition:all .25s; pointer-events:none;
  white-space:normal; max-width:calc(100vw - 40px); text-align:center;
  backdrop-filter:blur(8px); z-index:999;
}
#toast.toast-show { opacity:1; transform:translateX(-50%) translateY(0); }
#toast.toast-error { background:rgba(255,59,48,0.9); }

/* CART PANEL */
.cart-panel {
  background:var(--white);
  border-top: 1px solid rgba(10,10,30,0.07);
  flex-shrink:0;
  overflow:hidden;
  transition: max-height .3s cubic-bezier(0.32,0.72,0,1);
  max-height: 0;
}
.cart-panel.has-items { max-height: 220px; }

.cart-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 10px 20px 6px;
}
.cart-title {
  font-size:13px; font-weight:700; color:var(--ink2);
  display:flex; align-items:center; gap:6px;
}
.cart-count-badge {
  background:var(--primary); color:white;
  font-size:11px; font-weight:700;
  min-width:20px; height:20px; border-radius:100px;
  display:flex; align-items:center; justify-content:center; padding:0 5px;
}
.cart-clear-btn {
  font-size:12px; color:var(--ink3); background:none; border:none;
  cursor:pointer; font-family:'Prompt',sans-serif; padding:4px 8px;
  border-radius:8px; transition:background .12s;
}
.cart-clear-btn:active { background:var(--surface); }

.cart-items {
  display:flex; gap:8px;
  padding:0 20px 8px;
  overflow-x:auto; scrollbar-width:none;
}
.cart-items::-webkit-scrollbar { display:none; }

.cart-item-chip {
  flex-shrink:0;
  display:flex; align-items:center; gap:6px;
  background:var(--surface); border-radius:12px;
  padding:6px 10px 6px 8px;
  border:1.5px solid rgba(26,107,255,0.15);
  cursor:pointer; transition:all .12s;
}
.cart-item-chip:active { background:#e8edf8; }
.cart-item-chip-icon { font-size:16px; line-height:1; }
.cart-item-chip-info { display:flex; flex-direction:column; }
.cart-item-chip-name { font-size:11px; font-weight:600; color:var(--ink); }
.cart-item-chip-qty  { font-size:11px; color:var(--primary); font-weight:700; }
.cart-item-chip-remove {
  width:16px; height:16px; border-radius:50%;
  background:rgba(10,10,30,0.1); border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; color:var(--ink3); cursor:pointer;
  margin-left:2px; flex-shrink:0;
}

.cart-confirm-row {
  padding: 0 20px 10px;
}
.cart-confirm-btn {
  width:100%; padding:13px;
  border-radius:14px;
  background:linear-gradient(135deg,#00C853 0%,#00A844 100%);
  color:white; border:none;
  font-family:'Prompt',sans-serif; font-size:15px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer;
  box-shadow:0 4px 14px rgba(0,200,83,0.35);
  transition:opacity .15s, transform .1s;
}
.cart-confirm-btn:active { opacity:0.85; transform:scale(0.98); }
.cart-confirm-btn:disabled { opacity:0.4; pointer-events:none; box-shadow:none; }

/* LOADING OVERLAY */
.loading-overlay {
  position:fixed; inset:0; background:rgba(245,245,250,0.85);
  display:flex; align-items:center; justify-content:center;
  z-index:500; backdrop-filter:blur(4px);
  transition:opacity .3s;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; }

/* SUPABASE CONFIG BANNER */
.config-banner {
  background:#FFF3CD; border-bottom:2px solid #FF9F0A;
  padding:8px 20px; font-size:12px; font-weight:500; color:#664D03;
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.config-banner i { color:var(--amber); font-size:16px; }
.config-banner a { color:var(--primary); text-decoration:underline; }

/* ══════════════════════════════════════════
   iOS WEIGHT INPUT MODAL
══════════════════════════════════════════ */
.kg-modal-backdrop {
  position:fixed; inset:0; z-index:800;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  transition: background .28s ease, backdrop-filter .28s ease;
  pointer-events:none;
}
.kg-modal-backdrop.open {
  background:rgba(0,0,0,0.40);
  backdrop-filter:blur(6px);
  pointer-events:all;
}

.kg-modal {
  position:fixed; left:0; right:0; bottom:0;
  z-index:801;
  background:transparent;
  transform: translateY(100%);
  transition: transform .38s cubic-bezier(0.32,0.72,0,1);
  will-change: transform;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.kg-modal.open {
  transform: translateY(0);
}

.kg-sheet {
  background: rgba(255,255,255,0.96);
  backdrop-filter: saturate(180%) blur(30px);
  -webkit-backdrop-filter: saturate(180%) blur(30px);
  border-radius: 24px 24px 0 0;
  overflow: hidden;
  box-shadow: 0 -4px 40px rgba(0,0,0,0.18);
}

.kg-handle {
  width:36px; height:4px;
  background: rgba(60,60,67,0.3);
  border-radius:100px;
  margin: 10px auto 0;
}

.kg-header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 20px 8px;
}
.kg-item-info { display:flex; align-items:center; gap:10px; }
.kg-item-icon { font-size:28px; line-height:1; }
.kg-item-name { font-size:16px; font-weight:700; color:var(--ink); }
.kg-item-price { font-size:12px; color:var(--ink3); margin-top:1px; }
.kg-close-btn {
  width:32px; height:32px; border-radius:50%;
  background: rgba(60,60,67,0.12);
  border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--ink2);
  transition:background .12s;
}
.kg-close-btn:active { background:rgba(60,60,67,0.22); }

/* Display area */
.kg-display {
  margin: 4px 20px 12px;
  background: var(--surface);
  border-radius: 18px;
  padding: 12px 18px;
  display:flex; align-items:flex-end; justify-content:space-between;
}
.kg-display-left {}
.kg-display-label {
  font-size:11px; font-weight:500; color:var(--ink3);
  text-transform:uppercase; letter-spacing:.8px; margin-bottom:2px;
}
.kg-display-val {
  font-size:44px; font-weight:800; color:var(--ink);
  line-height:1; letter-spacing:-2px;
  min-height:52px;
  display:flex; align-items:center; gap:4px;
}
.kg-display-val .unit {
  font-size:18px; font-weight:500; color:var(--ink3);
  letter-spacing:0; margin-bottom:4px;
}
.kg-display-val .cursor {
  width:3px; height:40px; background:var(--primary);
  border-radius:2px; margin-left:2px;
  animation: blink .9s step-end infinite;
}
@keyframes blink { 50%{opacity:0;} }
.kg-display-right {}
.kg-subtotal-label { font-size:11px; color:var(--ink3); text-align:right; }
.kg-subtotal-val { font-size:20px; font-weight:800; color:var(--primary); text-align:right; margin-top:2px; }

/* Quick presets */
.kg-presets {
  display:flex; gap:6px;
  padding: 0 20px 10px;
  overflow-x:auto; scrollbar-width:none;
}
.kg-presets::-webkit-scrollbar{display:none;}
.kg-preset-btn {
  flex-shrink:0;
  font-family:'Prompt',sans-serif; font-size:12px; font-weight:600;
  padding:6px 14px; border-radius:100px;
  border:1.5px solid rgba(26,107,255,0.2);
  background:rgba(26,107,255,0.06);
  color:var(--primary); cursor:pointer;
  transition:all .12s;
}
.kg-preset-btn:active { background:rgba(26,107,255,0.18); transform:scale(0.93); }

/* Numpad */
.kg-numpad {
  display:grid; grid-template-columns: repeat(3,1fr);
  gap:1px; background:rgba(60,60,67,0.1);
  border-top:1px solid rgba(60,60,67,0.08);
  margin:0;
}
.kg-key {
  background: rgba(255,255,255,0.95);
  border:none; padding:0;
  height:68px; display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  font-family:'Prompt',sans-serif;
  transition:background .08s;
  position:relative; overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
}
.kg-key:active { background:rgba(209,209,214,0.8); }
.kg-key.dark {
  background:rgba(174,174,178,0.35);
}
.kg-key.dark:active { background:rgba(174,174,178,0.65); }
.kg-key-num {
  font-size:26px; font-weight:400; color:var(--ink); letter-spacing:-0.5px;
}
.kg-key-sub {
  font-size:9px; color:var(--ink3); position:absolute; bottom:10px;
  letter-spacing:.5px;
}
.kg-key-icon { font-size:22px; color:var(--ink); }
.kg-key.primary-key {
  background:var(--primary);
}
.kg-key.primary-key:active { background:var(--primary-d); }
.kg-key.primary-key .kg-key-num,
.kg-key.primary-key .kg-key-icon { color:white; }

/* Ripple on key press */
.ripple {
  position:absolute; border-radius:50%;
  background:rgba(255,255,255,0.4);
  transform:scale(0); animation:ripple-anim .4s linear;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(4);opacity:0;}}

/* Confirm button inside numpad area */
.kg-confirm-row {
  padding:10px 20px;
  background:rgba(255,255,255,0.95);
}
.kg-confirm-btn {
  width:100%; padding:15px;
  border-radius:16px;
  background:linear-gradient(135deg,#1A6BFF 0%,#0040CC 100%);
  color:white; border:none;
  font-family:'Prompt',sans-serif; font-size:16px; font-weight:700;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(26,107,255,0.35);
  transition:opacity .15s, transform .1s;
}
.kg-confirm-btn:active { opacity:0.85; transform:scale(0.98); }
.kg-confirm-btn:disabled { opacity:0.35; pointer-events:none; box-shadow:none; }

/* Mode toggle (kg / ชิ้น) */
.kg-mode-toggle {
  display:flex; gap:0;
  margin: 8px 20px 4px;
  background: var(--surface);
  border-radius: 12px;
  padding: 3px;
}
.kg-mode-btn {
  flex:1; padding:7px 0;
  border:none; border-radius:9px;
  font-family:'Prompt',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .18s;
  background:transparent; color:var(--ink3);
}
.kg-mode-btn.active {
  background:var(--white);
  color:var(--primary);
  box-shadow:0 1px 6px rgba(10,10,30,0.10);
}
</style>
</head>
<body>

<div class="status-bar"></div>

<div class="config-banner" id="config-banner">
  <i class="ph ph-warning-circle"></i>
  <span>กรุณาตั้งค่า Supabase ใน <b>supabase.js</b> — ตอนนี้ใช้ข้อมูล Demo</span>
</div>

<header>
  <div class="header-top">
    <div class="app-logo">
      <div class="logo-mark"><i class="ph ph-recycle"></i></div>
      <span class="app-name">ScrapPOS</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="รีเฟรช" onclick="loadItems()">
        <i class="ph ph-arrows-clockwise"></i>
      </button>
      <button class="icon-btn" onclick="window.AUTH && window.AUTH.logout()" title="ออกจากระบบ"><i class="ph ph-sign-out"></i></button>
    </div>
  </div>
  <div class="page-title">รับซื้อ <span class="page-sub">Buy</span></div>
</header>

<div class="app-body">
  <div class="catalogue">
    <div class="search-area">
      <div class="search-field">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="ค้นหาสินค้า...">
      </div>
    </div>

    <div class="cat-bar" id="cat-bar"><button class="cat-btn on" data-cat="all">ทั้งหมด</button></div>

    <div class="item-grid-wrap">
      <div class="item-grid" id="item-grid">
        <div class="grid-loading">
          <i class="ph ph-spinner-gap spin" style="font-size:28px;"></i>
          <span style="font-size:13px;">กำลังโหลดสินค้า...</span>
        </div>
      </div>
    </div>
</div>

<!-- CART PANEL (inside app-body flow) -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <div class="cart-title">
      <i class="ph ph-shopping-cart-simple"></i>
      ตะกร้ารับซื้อ
      <span class="cart-count-badge" id="cart-count">0</span>
    </div>
    <button class="cart-clear-btn" onclick="clearCart()">ล้างทั้งหมด</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-confirm-row">
    <button class="cart-confirm-btn" id="cart-confirm-btn" onclick="confirmCart()">
      <i class="ph ph-check-circle"></i>
      <span id="cart-confirm-label">บันทึกทั้งหมด</span>
    </button>
  </div>
</div>
</div>

<!-- BOTTOM NAV -->

// icon bg color per category — iOS-style colored pill
const CAT_COLOR = {
  metal:      {bg:'#E8EDF8', fg:'#3A6CC8'},
  paper:      {bg:'#FFF3E0', fg:'#E07A20'},
  plastic:    {bg:'#E8F5E9', fg:'#2E7D32'},

  'beer-crate':{bg:'#FDE8C8', fg:'#C06000'},
  default:    {bg:'#F3F0FF', fg:'#5E35B1'},
};
function itemColor(cat){ return CAT_COLOR[cat] || CAT_COLOR.default; }

// render icon — if it looks like a ph-* class use Phosphor, else show as emoji text
function renderIcon(icon, cat, size=28) {
  if (icon && icon.startsWith('ph-')) {
    const c = itemColor(cat);
    return `<span class="ph-icon-wrap" style="background:${c.bg};color:${c.fg};width:${size+16}px;height:${size+16}px;font-size:${size}px;">
      <i class="ph-fill ${icon}"></i></span>`;
  }
  // fallback: emoji
  return `<span style="font-size:${size}px;line-height:1;">${icon}</span>`;
}

let ITEMS = [];
let cart = {};
let CATS = [];
function catLabel(s){ return CATS.find(c=>c.slug===s)?.label||s; }
function catIcon(s){  return CATS.find(c=>c.slug===s)?.icon||'📦'; }

// ══════════════════════════════════════════
//  KG MODAL STATE
// ══════════════════════════════════════════
let kgModalItemId = null;
let kgBuffer = '';   // string เก็บตัวเลขที่กด
let currentMode = 'kg'; // 'kg' | 'piece'

function openKgModal(id) {
  const item = ITEMS.find(x => x.id === id);
  if (!item) return;
  kgModalItemId = id;

  // กำหนด mode จาก item.sell_mode (default 'kg')
  const itemMode = item.sell_mode || 'kg';
  setMode(itemMode);

  kgBuffer = cart[id] ? String(cart[id].qty) : '';

  document.getElementById('kg-item-icon').innerHTML = renderIcon(item.icon, item.cat, 26);
  document.getElementById('kg-item-name').textContent = item.name;
  document.getElementById('kg-item-price').textContent = `฿${Number(item.buy_price).toFixed(2)} / ${item.unit||'กก.'}`;

  // ล็อค mode ตาม sell_mode ของ item ไม่ให้ user เปลี่ยน
  const toggle = document.getElementById('kg-mode-toggle');
  toggle.style.display = item.sell_mode ? 'none' : 'flex';

  updateKgDisplay();

  document.getElementById('kg-backdrop').classList.add('open');
  document.getElementById('kg-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeKgModal() {
  document.getElementById('kg-backdrop').classList.remove('open');
  document.getElementById('kg-modal').classList.remove('open');
  document.body.style.overflow = '';
  kgModalItemId = null;
  kgBuffer = '';
}

function setMode(mode) {
  currentMode = mode;
  // อัปเดต toggle buttons
  document.getElementById('mode-btn-kg').classList.toggle('active', mode === 'kg');
  document.getElementById('mode-btn-piece').classList.toggle('active', mode === 'piece');
  // สลับ presets
  document.getElementById('kg-presets-kg').style.display    = mode === 'kg'    ? 'flex' : 'none';
  document.getElementById('kg-presets-piece').style.display = mode === 'piece' ? 'flex' : 'none';
  // อัปเดต display label + unit
  if (mode === 'kg') {
    document.getElementById('kg-display-label').textContent = 'น้ำหนัก';
    document.getElementById('kg-unit-label').textContent    = 'กก.';
  } else {
    document.getElementById('kg-display-label').textContent = 'จำนวน';
    document.getElementById('kg-unit-label').textContent    = 'ชิ้น';
  }
  // reset buffer เมื่อเปลี่ยน mode
  kgBuffer = '';
  updateKgDisplay();
}

function updateKgDisplay() {
  const numEl   = document.getElementById('kg-display-num');
  const subEl   = document.getElementById('kg-subtotal');
  const btnEl   = document.getElementById('kg-confirm-btn');
  const lblEl   = document.getElementById('kg-confirm-label');

  const val = parseFloat(kgBuffer) || 0;
  numEl.textContent = kgBuffer || '0';

  const item = kgModalItemId ? ITEMS.find(x => x.id === kgModalItemId) : null;
  const price = item ? Number(item.buy_price) : 0;
  const sub = val * price;
  subEl.textContent = sub > 0 ? `฿${sub.toFixed(2)}` : '฿0';

  const unitText = currentMode === 'kg' ? 'กก.' : 'ชิ้น';
  const valid = val > 0;
  btnEl.disabled = !valid;
  if (valid) {
    lblEl.textContent = `เพิ่ม ${val} ${unitText} = ฿${sub.toFixed(2)}`;
  } else {
    lblEl.textContent = 'เพิ่มในตะกร้า';
  }
}

function kpNum(n, e) {
  if (kgBuffer.length >= 7) return;
  if (kgBuffer === '0') kgBuffer = n;
  else kgBuffer += n;
  rippleKey(e);
  updateKgDisplay();
}

function kpDot(e) {
  if (currentMode === 'piece') return; // ชิ้นต้องเป็นจำนวนเต็มเท่านั้น
  if (kgBuffer.includes('.')) return;
  if (!kgBuffer) kgBuffer = '0';
  kgBuffer += '.';
  rippleKey(e);
  updateKgDisplay();
}

function kpBack(e) {
  kgBuffer = kgBuffer.slice(0, -1);
  rippleKey(e);
  updateKgDisplay();
}

function setPreset(val) {
  kgBuffer = String(val);
  updateKgDisplay();
  // pulse animation
  const el = document.getElementById('kg-display-num');
  el.style.transition = 'transform .12s';
  el.style.transform = 'scale(1.08)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 120);
}

function rippleKey(e) {
  if (!e || !e.currentTarget) return;
  const btn = e.currentTarget;
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${size}px;height:${size}px;left:${size/2}px;top:${size/2}px;margin:-${size/2}px;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);
}

async function confirmKg() {
  const val = parseFloat(kgBuffer);
  if (!val || val <= 0 || !kgModalItemId) { closeKgModal(); return; }
  const id = kgModalItemId;
  const item = ITEMS.find(x => x.id === id);
  if (!item) { closeKgModal(); return; }

  const mode      = currentMode;
  const unitLabel = mode === 'kg' ? 'กก.' : (item.unit || 'ชิ้น');

  // เพิ่ม/อัปเดตใน cart — ไม่ clear cart
  cart[id] = { item, qty: val, mode, unitLabel };

  closeKgModal();
  renderGrid();
  renderCartPanel();
  toast(`✓ ${item.name} ${val} ${unitLabel}`);
}

// ══════════════════════════════════════════
//  CART PANEL
// ══════════════════════════════════════════
function renderCartPanel() {
  const panel    = document.getElementById('cart-panel');
  const listEl   = document.getElementById('cart-items-list');
  const countEl  = document.getElementById('cart-count');
  const btnEl    = document.getElementById('cart-confirm-btn');
  const lblEl    = document.getElementById('cart-confirm-label');

  const entries = Object.values(cart);
  const count   = entries.length;

  panel.classList.toggle('has-items', count > 0);
  countEl.textContent = count;

  if (!count) { listEl.innerHTML = ''; return; }

  const totalAmt = entries.reduce((s, c) => {
    // fix floating point: ปัดทศนิยม 2 ตำแหน่ง
    return s + Math.round(c.qty * Number(c.item.buy_price) * 100) / 100;
  }, 0);

  listEl.innerHTML = entries.map(c => `
    <div class="cart-item-chip" onclick="openKgModal(${c.item.id})">
      <div class="cart-item-chip-icon">${renderIcon(c.item.icon, c.item.cat, 14)}</div>
      <div class="cart-item-chip-info">
        <div class="cart-item-chip-name">${c.item.name}</div>
        <div class="cart-item-chip-qty">${c.qty} ${c.unitLabel}</div>
      </div>
      <button class="cart-item-chip-remove" onclick="event.stopPropagation();removeFromCart(${c.item.id})">
        <i class="ph ph-x"></i>
      </button>
    </div>
  `).join('');

  lblEl.textContent = `บันทึก ${count} รายการ — ฿${totalAmt.toFixed(2)}`;
  btnEl.disabled = false;
}

function removeFromCart(id) {
  delete cart[id];
  renderGrid();
  renderCartPanel();
}

function clearCart() {
  cart = {};
  renderGrid();
  renderCartPanel();
}

async function confirmCart() {
  const entries = Object.values(cart);
  if (!entries.length) return;

  const btnEl = document.getElementById('cart-confirm-btn');
  const lblEl = document.getElementById('cart-confirm-label');
  btnEl.disabled = true;
  lblEl.textContent = 'กำลังบันทึก...';

  // fix floating point ตรงนี้ด้วย
  const lines = entries.map(c => ({
    item_id:    c.item.id,
    item_name:  c.item.name,
    qty:        c.qty,
    kg:         c.mode === 'kg' ? c.qty : null,
    mode:       c.mode,
    unit_label: c.unitLabel,
    price:      Number(c.item.buy_price),
    subtotal:   Math.round(c.qty * Number(c.item.buy_price) * 100) / 100,
  }));
  const totalAmt = lines.reduce((s, l) => s + l.subtotal, 0);

  if (!SUPABASE_READY) {
    await new Promise(r => setTimeout(r, 700));
    toast(`✓ บันทึก ${lines.length} รายการ | ฿${totalAmt.toFixed(2)}`);
    cart = {};
    renderGrid();
    renderCartPanel();
    return;
  }

  try {
    await sbFetch('rpc/record_buy_transaction', {
      method: 'POST',
      body: { p_lines: lines },
      prefer: 'return=representation',
    });
    toast(`✅ บันทึก ${lines.length} รายการ | ฿${totalAmt.toFixed(2)}`);
    cart = {};
    renderGrid();
    renderCartPanel();
    loadItems();
  } catch (err) {
    toast('❌ บันทึกไม่สำเร็จ: ' + err.message, 'error');
    btnEl.disabled = false;
    const count = entries.length;
    lblEl.textContent = `บันทึก ${count} รายการ — ฿${totalAmt.toFixed(2)}`;
  }
}

// ══════════════════════════════════════════
//  SUPABASE REST
// ══════════════════════════════════════════
let _sb = null;

async function sbFetch(path, opts = {}) {
  let token = SUPABASE_ANON;
  if (_sb) {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) token = session.access_token;
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers,
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

//  LOAD ITEMS
// ══════════════════════════════════════════
async function loadCats() {
  try {
    const r = await sbFetch('categories?select=slug,label,icon&order=id');
    if (r && r.length) CATS = r;
  } catch(_) {}
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  if (!bar) return;
  bar.innerHTML = '<button class="cat-btn on" data-cat="all">ทั้งหมด</button>'
    + CATS.map(c=>`<button class="cat-btn" data-cat="${c.slug}">${c.icon} ${c.label}</button>`).join('');
  bar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      bar.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('on', b===btn));
      activeCat = btn.dataset.cat;
      renderGrid();
    });
  });
}

let activeCat = 'all';
let query = '';

async function loadItems() {
  const grid = document.getElementById('item-grid');
  grid.innerHTML = `<div class="grid-loading"><i class="ph ph-spinner-gap spin" style="font-size:28px;"></i><span style="font-size:13px;">กำลังโหลดสินค้า...</span></div>`;

  if (!SUPABASE_READY) {
    await new Promise(r => setTimeout(r, 400));
    ITEMS = DEMO_ITEMS;
    document.getElementById('config-banner').style.display = 'flex';
    renderCatBar();
    renderGrid();
    return;
  }

  document.getElementById('config-banner').style.display = 'none';

  try {
    await loadCats();
    renderCatBar();
    ITEMS = await sbFetch('items?select=id,name,icon,buy_price,unit,cat,sell_mode&order=cat,name') || [];
    renderGrid();
  } catch (err) {
    grid.innerHTML = `<div class="grid-loading"><i class="ph ph-warning-circle" style="font-size:28px;color:var(--red);"></i><span style="font-size:13px;color:var(--red);">โหลดไม่สำเร็จ: ${err.message}</span></div>`;
    toast('❌ ' + err.message, 'error');
  }
}

// ══════════════════════════════════════════
//  RENDER GRID
// ══════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('item-grid');
  let list = ITEMS;
  if (activeCat !== 'all') list = list.filter(x => x.cat === activeCat);
  if (query) list = list.filter(x => x.name.includes(query));

  if (!list.length) {
    grid.innerHTML = `<div class="grid-loading"><i class="ph ph-magnifying-glass" style="font-size:28px;"></i><span style="font-size:13px;">ไม่พบสินค้า</span></div>`;
    return;
  }

  grid.innerHTML = list.map(item => {
    const inCart = !!cart[item.id];
    const qty    = inCart ? cart[item.id].qty : 0;
    const mode   = inCart ? cart[item.id].mode : (item.sell_mode || 'kg');
    const unit   = mode === 'kg' ? 'กก.' : (item.unit || 'ชิ้น');
    const qtyLabel = qty % 1 === 0 ? qty : qty.toFixed(1);
    return `
    <div class="item-card ${inCart?'selected':''}" onclick="openKgModal(${item.id})">
      <div class="card-badge">${qtyLabel} ${unit}</div>
      <div class="card-icon">${renderIcon(item.icon, item.cat, 26)}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-bottom">
        <div class="card-price">฿${Number(item.buy_price).toFixed(2)}<span class="card-price-unit">/${item.unit||'กก.'}</span></div>
        <button class="card-add-btn" onclick="event.stopPropagation();openKgModal(${item.id})">
          <i class="ph ${inCart?'ph-pencil':'ph-plus'}"></i>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', e => {
  query = e.target.value.trim();
  renderGrid();
});

// Swipe down to close modal
let touchStartY = 0;
document.getElementById('kg-modal').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('kg-modal').addEventListener('touchmove', e => {
  const dy = e.touches[0].clientY - touchStartY;
  if (dy > 60) closeKgModal();
}, {passive:true});

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast-show' + (type === 'error' ? ' toast-error' : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = ''; }, 2200);
}

// INIT
(async () => {
  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  if (!SUPABASE_READY) {
    // Demo mode — ข้าม auth
    window.AUTH = { user: { email: 'demo@demo.com' }, logout: () => {} };
    loadItems();
    return;
  }

  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    window.location.replace('login.html');
    return;
  }
  window.AUTH = {
    token: session.access_token,
    user: session.user,
    logout: async () => { await _sb.auth.signOut(); window.location.replace('login.html'); }
  };
  loadItems();
})();
</script>
