<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScrapPOS — เข้าสู่ระบบ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root {
  --ink:#0A0A0F; --ink2:#3A3A4A; --ink3:#8A8A9A;
  --surface:#F5F5FA; --white:#FFFFFF;
  --green:#00C853; --red:#FF3B30;
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:'Prompt',sans-serif;
  background:var(--ink);
  min-height:100dvh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px;
  padding-top:env(safe-area-inset-top,20px);
  padding-bottom:env(safe-area-inset-bottom,20px);
  -webkit-font-smoothing:antialiased;
  position:relative; overflow:hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 20%,rgba(255,107,0,.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(26,107,255,.10) 0%,transparent 60%);
  pointer-events:none;
}
.logo-area { text-align:center; margin-bottom:36px; animation:fadeDown .5s ease both; }
.logo-badge {
  width:64px; height:64px; background:white; border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  font-size:32px; margin:0 auto 14px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.logo-name { font-size:28px; font-weight:900; color:white; letter-spacing:-1px; }
.logo-sub { font-size:13px; color:rgba(255,255,255,.4); margin-top:4px; letter-spacing:1px; }
.login-card {
  background:white; border-radius:28px; padding:28px 24px;
  width:100%; max-width:400px;
  box-shadow:0 24px 64px rgba(0,0,0,.4);
  animation:fadeUp .5s ease .1s both;
  position: relative;
}
.card-title { font-size:20px; font-weight:800; color:var(--ink); margin-bottom:4px; }
.card-sub { font-size:13px; color:var(--ink3); margin-bottom:24px; }

/* Identifier-first specific styles */
.step-container { display: none; animation: fadeIn .3s ease; }
.step-container.active { display: block; }
.user-badge {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); padding: 12px 16px;
  border-radius: 14px; margin-bottom: 16px;
  border: 1.5px solid rgba(10,10,30,.04);
}
.user-badge-email {
  font-size: 14px; font-weight: 500; color: var(--ink);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.user-badge-edit {
  font-size: 12px; font-weight: 600; color: var(--ink3);
  background: none; border: none; cursor: pointer;
  padding: 4px; display: flex; align-items: center; gap: 4px;
  transition: color .2s; font-family: 'Prompt', sans-serif;
}
.user-badge-edit:hover { color: var(--ink); }

.field { margin-bottom:14px; }
.field-label {
  font-size:11px; font-weight:600; color:var(--ink3);
  letter-spacing:.5px; text-transform:uppercase;
  display:block; margin-bottom:6px;
}
.field-wrap { position:relative; }
.field-input {
  width:100%; padding:13px 44px 13px 16px; border-radius:14px;
  background:var(--surface); border:1.5px solid rgba(10,10,30,.08);
  font-family:'Prompt',sans-serif; font-size:14px; color:var(--ink);
  outline:none; transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;
}
.field-input:focus { border-color:var(--ink); box-shadow:0 0 0 3px rgba(10,10,30,.08); background:white; }
.field-input.error { border-color:var(--red); }
.field-icon {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  font-size:18px; color:var(--ink3); cursor:pointer;
}
.error-msg {
  display:none; align-items:center; gap:6px;
  background:rgba(255,59,48,.08); border:1px solid rgba(255,59,48,.2);
  border-radius:12px; padding:10px 14px;
  font-size:12px; font-weight:500; color:var(--red); margin-bottom:14px;
}
.error-msg.show { display:flex; }
.error-msg i { font-size:16px; flex-shrink:0; }
.login-btn {
  width:100%; padding:15px; border-radius:16px;
  background:var(--ink); color:white; border:none;
  font-family:'Prompt',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:background .15s,transform .1s; margin-top:8px;
}
.login-btn:active { transform:scale(.98); }
.login-btn:disabled { opacity:.5; pointer-events:none; }
.footer-note { text-align:center; margin-top:20px; font-size:11px; color:rgba(255,255,255,.3); animation:fadeUp .5s ease .2s both; }
.footer-note b { color:rgba(255,255,255,.5); }
.loading-overlay {
  position:fixed; inset:0; background:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; z-index:100; transition:opacity .4s;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; }
.loading-logo {
  width:56px; height:56px; background:white; border-radius:18px;
  display:flex; align-items:center; justify-content:center; font-size:28px;
  animation:pulse 1.5s ease infinite;
}
.loading-text { font-size:13px; color:rgba(255,255,255,.4); font-weight:500; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeDown { from{opacity:0;transform:translateY(-12px);} to{opacity:1;transform:translateY(0);} }
@keyframes fadeIn { from{opacity:0;transform:translateX(10px);} to{opacity:1;transform:translateX(0);} }
@keyframes spin { to{transform:rotate(360deg);} }
.spin { animation:spin .7s linear infinite; }
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-8px);}
  40%{transform:translateX(8px);}
  60%{transform:translateX(-5px);}
  80%{transform:translateX(5px);}
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">♻️</div>
  <div class="loading-text">กำลังตรวจสอบ...</div>
</div>

<div class="logo-area">
  <div class="logo-badge">♻️</div>
  <div class="logo-name">JanRecyc</div>
  <div class="logo-sub">ระบบรับซื้อของเก่า</div>
</div>

<div class="login-card">
  <div class="card-title" id="card-title">ยินดีต้อนรับ</div>
  <div class="card-sub" id="card-sub">กรอกอีเมลเพื่อเข้าสู่ระบบ</div>
  
  <div class="error-msg" id="error-msg">
    <i class="ph ph-warning-circle"></i>
    <span id="error-text">ข้อความแจ้งเตือน</span>
  </div>

  <!-- Step 1: Identifier (Email) -->
  <div class="step-container active" id="step-1">
    <div class="field">
      <label class="field-label">อีเมล</label>
      <div class="field-wrap">
        <input class="field-input" type="email" id="inp-email" placeholder="email@example.com" autocomplete="email" inputmode="email">
        <i class="ph ph-envelope field-icon"></i>
      </div>
    </div>
  </div>

  <!-- Step 2: Password -->
  <div class="step-container" id="step-2">
    <div class="user-badge">
      <div class="user-badge-email" id="display-email"></div>
      <button class="user-badge-edit" onclick="goBack()">
        เปลี่ยน
      </button>
    </div>
    <div class="field">
      <label class="field-label">รหัสผ่าน</label>
      <div class="field-wrap">
        <input class="field-input" type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
        <i class="ph ph-eye field-icon" id="eye-icon" onclick="togglePass()"></i>
      </div>
    </div>
  </div>

  <button class="login-btn" id="main-btn" onclick="handleAction()">
    <span id="btn-text">ถัดไป</span>
    <i class="ph ph-arrow-right" id="btn-icon"></i>
  </button>
</div>

<div class="footer-note">ติดต่อผู้ดูแลระบบหากไม่มีบัญชี<br><b>ScrapPOS v1.0</b></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL  = 'https://dhvbbdcsejtvgilcgpfh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRodmJiZGNzZWp0dmdpbGNncGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTEwMTMsImV4cCI6MjA5MzY2NzAxM30.B8TSWtXjf6A-Uq1f_JWf2Ghg2I2pCM2N1PV3r8yBlrs';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentStep = 1;

// เช็ค session
const overlay = document.getElementById('loading-overlay');
const { data: { session } } = await supabase.auth.getSession();
if (session) {
  window.location.replace('buy.html');
} else {
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 400);
  document.getElementById('inp-email').focus();
}

// ── ACTION HANDLER ──
window.handleAction = function() {
  if (currentStep === 1) {
    processEmail();
  } else {
    doLogin();
  }
};

// ── STEP 1: Process Email ──
function processEmail() {
  const email = document.getElementById('inp-email').value.trim();
  clearErrors();
  
  if (!email) return shakeField('inp-email', 'กรุณากรอกอีเมล');
  
  // เช็ครูปแบบอีเมลเบื้องต้น
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    return shakeField('inp-email', 'รูปแบบอีเมลไม่ถูกต้อง');
  }

  // เปลี่ยนเป็น Step 2
  currentStep = 2;
  document.getElementById('display-email').textContent = email;
  document.getElementById('step-1').classList.remove('active');
  document.getElementById('step-2').classList.add('active');
  
  // อัปเดต Text / Button
  document.getElementById('card-title').textContent = 'ป้อนรหัสผ่าน';
  document.getElementById('card-sub').textContent = 'สำหรับพนักงานร้าน janrecycs';
  
  const btnIcon = document.getElementById('btn-icon');
  btnIcon.className = 'ph ph-sign-in';
  // ย้ายไอคอนไปอยู่ด้านหน้าข้อความเหมือนดีไซน์เดิมตอนล็อกอิน
  document.getElementById('main-btn').insertBefore(btnIcon, document.getElementById('btn-text'));
  document.getElementById('btn-text').textContent = 'เข้าสู่ระบบ';

  document.getElementById('inp-pass').focus();
}

// ── GO BACK TO STEP 1 ──
window.goBack = function() {
  currentStep = 1;
  clearErrors();
  document.getElementById('inp-pass').value = ''; // เคลียร์รหัสผ่าน
  
  document.getElementById('step-2').classList.remove('active');
  document.getElementById('step-1').classList.add('active');
  
  document.getElementById('card-title').textContent = 'ยินดีต้อนรับ';
  document.getElementById('card-sub').textContent = 'กรอกอีเมลเพื่อเข้าสู่ระบบ';

  const btnIcon = document.getElementById('btn-icon');
  btnIcon.className = 'ph ph-arrow-right';
  // ย้ายไอคอนกลับไปต่อท้าย
  document.getElementById('main-btn').appendChild(btnIcon);
  document.getElementById('btn-text').textContent = 'ถัดไป';

  document.getElementById('inp-email').focus();
};

// ── STEP 2: LOGIN ──
window.doLogin = async function() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const btn   = document.getElementById('main-btn');

  clearErrors();
  if (!pass) return shakeField('inp-pass', 'กรุณากรอกรหัสผ่าน');

  btn.disabled = true;
  btn.innerHTML = '<i class="ph ph-spinner-gap spin"></i><span id="btn-text">กำลังเข้าสู่ระบบ...</span>';

  const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });

  if (error) {
    let msg = 'รหัสผ่านไม่ถูกต้อง'; // เปลี่ยนข้อความให้เจาะจงขึ้นเนื่องจากอีเมลน่าจะถูกแล้ว
    if (error.message.includes('Email not confirmed')) msg = 'กรุณายืนยันอีเมลก่อนเข้าใช้งาน';
    if (error.message.includes('Too many requests'))   msg = 'ลองใหม่อีกครั้งในอีกสักครู่';
    
    showError(msg);
    document.getElementById('inp-pass').classList.add('error');
    btn.disabled = false;
    btn.innerHTML = '<i class="ph ph-sign-in" id="btn-icon"></i><span id="btn-text">เข้าสู่ระบบ</span>';
    return;
  }

  btn.innerHTML = '<i class="ph ph-check-circle"></i><span>เข้าสู่ระบบสำเร็จ</span>';
  btn.style.background = '#00C853';
  setTimeout(() => window.location.replace('buy.html'), 600);
};

// ── UI HELPERS ──
function showError(msg) {
  const el = document.getElementById('error-msg');
  document.getElementById('error-text').textContent = msg;
  el.classList.add('show');
}
function clearErrors() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('inp-email').classList.remove('error');
  document.getElementById('inp-pass').classList.remove('error');
}
function shakeField(id, msg) {
  const el = document.getElementById(id);
  el.classList.add('error');
  el.style.animation = 'shake .35s ease';
  el.addEventListener('animationend', () => el.style.animation = '', {once:true});
  el.focus();
  showError(msg);
}
window.togglePass = function() {
  const inp = document.getElementById('inp-pass');
  const icon = document.getElementById('eye-icon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = `ph ph-eye${inp.type==='password'?'':'-slash'} field-icon`;
};

document.addEventListener('keydown', e => { 
  if (e.key === 'Enter') window.handleAction(); 
});
</script>
</body>
</html>
