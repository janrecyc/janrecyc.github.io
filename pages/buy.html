<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับซื้อของเข้า - Scrap POS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overscroll-behavior: none;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            scrollbar-width: none;
        }

        nav div {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>

<body class="bg-[#f8fafc] flex flex-col h-[100dvh] text-slate-800">

<!-- 🔷 APP -->
<main class="flex-1 flex flex-col overflow-hidden">

    <!-- HEADER -->
    <header class="shrink-0 bg-white px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                <i class="ph-fill ph-download-simple text-lg"></i>
            </div>
            <h1 class="text-lg font-bold">รับซื้อของเข้า</h1>
        </div>
        <div class="text-[10px] bg-slate-100 px-2 py-1 rounded-md">
            เลือกสินค้าเพื่อเพิ่มบิล
        </div>
    </header>

    <!-- CONTENT -->
    <div class="flex-1 flex flex-col lg:flex-row overflow-hidden">

        <!-- ITEM GRID -->
        <section class="flex-1 overflow-hidden border-b lg:border-b-0 lg:border-r border-slate-200">
            <div id="item-grid"
                class="h-full overflow-y-auto p-3 grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">

                <div class="col-span-full text-center text-slate-400 py-20">
                    <i class="ph ph-spinner-gap animate-spin text-4xl"></i>
                    <p>กำลังโหลด...</p>
                </div>

            </div>
        </section>

        <!-- CART -->
        <section class="h-[45%] lg:h-full lg:w-[40%] flex flex-col bg-white">

            <div class="shrink-0 p-3 border-b bg-slate-50 flex justify-between">
                <span class="font-bold">บิลปัจจุบัน</span>
                <span id="cart-count">0 รายการ</span>
            </div>

            <div id="cart-container"
                class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50">

                <div id="empty-cart-msg" class="text-center text-slate-400 mt-10">
                    ยังไม่มีสินค้า
                </div>

            </div>

            <div class="shrink-0 p-4 border-t bg-white">

                <div class="flex justify-between mb-2">
                    <span>น้ำหนักรวม</span>
                    <span><span id="total-weight">0.00</span> กก.</span>
                </div>

                <div class="flex justify-between mb-3">
                    <span>ยอดจ่าย</span>
                    <span class="text-green-600 text-xl font-bold">
                        ฿ <span id="total-amount">0.00</span>
                    </span>
                </div>

                <button id="checkout-btn"
                    class="w-full bg-blue-600 text-white py-3 rounded-xl disabled:bg-gray-300">
                    บันทึกและจ่ายเงิน
                </button>

            </div>

        </section>
    </div>

</main>

<!-- 🔻 BOTTOM NAV (ลื่น + ครบ + ไม่บัง) -->
<nav class="sticky bottom-0 bg-white border-t border-slate-200 z-50">
    
    <div class="flex overflow-x-auto hide-scrollbar scroll-smooth pb-[env(safe-area-inset-bottom)]">

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-blue-600 bg-blue-50 border-t-2 border-blue-600">
            <i class="ph-fill ph-download-simple text-2xl"></i>
            <span class="text-[10px] font-bold">รับซื้อ</span>
        </a>

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-upload-simple text-2xl"></i>
            <span class="text-[10px]">ขายออก</span>
        </a>

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-recycle text-2xl"></i>
            <span class="text-[10px]">คัดแยก</span>
        </a>

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-chart-line-up text-2xl"></i>
            <span class="text-[10px]">บอร์ดราคา</span>
        </a>

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-package text-2xl"></i>
            <span class="text-[10px]">สต๊อก</span>
        </a>

        <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-money text-2xl"></i>
            <span class="text-[10px]">ปิดกะ</span>
        </a>

        <div class="w-2 shrink-0"></div>
    </div>

</nav>

<!-- TOAST -->
<div id="toast"
    class="fixed top-5 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded opacity-0">
    <span id="toast-msg"></span>
</div>

<script type="module" src="../js/buy.js"></script>

</body>
</html>
