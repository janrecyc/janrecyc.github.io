<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บอร์ดราคา - Scrap POS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            overscroll-behavior: none;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-[#f8fafc] flex flex-col h-[100dvh] text-slate-800">

<!-- 🔷 APP -->
<main class="flex-1 flex flex-col overflow-hidden">

    <!-- HEADER (เหมือน buy.html) -->
    <header class="shrink-0 bg-white px-4 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                <i class="ph-fill ph-chart-line-up text-lg"></i>
            </div>
            <h1 class="text-lg font-bold">บอร์ดราคา</h1>
        </div>

        <div id="connection-status" class="text-[10px] bg-slate-100 px-2 py-1 rounded-md">
            กำลังเชื่อมต่อ...
        </div>
    </header>

    <!-- CONTENT -->
    <div class="flex-1 overflow-hidden">
        <div id="price-card-container"
            class="h-full overflow-y-auto p-3 grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-3">

            <div class="col-span-full text-center text-slate-400 py-20">
                <i class="ph ph-spinner-gap animate-spin text-4xl"></i>
                <p>กำลังโหลดข้อมูล...</p>
            </div>

        </div>
    </div>

</main>

<!-- 🔻 BOTTOM NAV (เหมือนกันทุกหน้า + ลิงก์จริง) -->
<nav class="sticky bottom-0 bg-white border-t border-slate-200 z-50">
    
    <div class="flex overflow-x-auto hide-scrollbar scroll-smooth pb-[env(safe-area-inset-bottom)]">

        <!-- รับซื้อ -->
        <a href="buy.html"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-download-simple text-2xl"></i>
            <span class="text-[10px]">รับซื้อ</span>
        </a>

        <!-- ขาย -->
        <a href="#"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-upload-simple text-2xl"></i>
            <span class="text-[10px]">ขายออก</span>
        </a>

        <!-- คัดแยก -->
        <a href="#"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-recycle text-2xl"></i>
            <span class="text-[10px]">คัดแยก</span>
        </a>

        <!-- บอร์ดราคา (active) -->
        <a href="prices.html"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-blue-600 bg-blue-50 border-t-2 border-blue-600">
            <i class="ph-fill ph-chart-line-up text-2xl"></i>
            <span class="text-[10px] font-bold">บอร์ดราคา</span>
        </a>

        <!-- สต๊อก -->
        <a href="#"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-package text-2xl"></i>
            <span class="text-[10px]">สต๊อก</span>
        </a>

        <!-- ปิดกะ -->
        <a href="#"
            class="shrink-0 min-w-[76px] px-2 flex flex-col items-center py-2.5 text-slate-400">
            <i class="ph ph-money text-2xl"></i>
            <span class="text-[10px]">ปิดกะ</span>
        </a>

        <div class="w-2 shrink-0"></div>
    </div>

</nav>

<!-- TOAST -->
<div id="toast"
    class="fixed top-5 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded opacity-0">
    <span id="toast-msg"></span>
</div>

<script type="module" src="../js/prices.js"></script>

</body>
</html>
