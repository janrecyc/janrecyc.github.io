<!-- pages/prices.html -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บอร์ดราคา - Scrap POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ซ่อนลูกศรใน input type="number" ให้ดูสะอาดตา */
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        /* Animation แฟลชสีเขียวตอนราคาเด้งเปลี่ยน */
        .flash-update { animation: flashGreen 1.5s ease-out; }
        @keyframes flashGreen {
            0% { background-color: #bbf7d0; } /* Tailwind green-200 */
            100% { background-color: transparent; }
        }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    
    <!-- พื้นที่สำหรับ Sidebar -->
    <div id="sidebar-container"></div>

    <!-- พื้นที่หลัก -->
    <main class="ml-64 flex-1 flex flex-col h-full">
        <!-- Header -->
        <header class="bg-white shadow-sm px-8 py-5 flex justify-between items-center z-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">📈 บอร์ดราคาตลาด</h1>
                <p class="text-slate-500 mt-1">จัดการราคารับซื้อ-ขายออก ประจำวัน</p>
            </div>
            <!-- สถานะการเชื่อมต่อ Realtime -->
            <div id="connection-status" class="flex items-center gap-2 bg-amber-100 text-amber-700 px-4 py-2 rounded-full text-sm font-medium transition-colors">
                <span class="animate-pulse">🟡</span> กำลังเชื่อมต่อ Realtime...
            </div>
        </header>

        <!-- Content (Table) -->
        <div class="p-8 overflow-y-auto flex-1">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-100 text-slate-600 font-medium">
                        <tr>
                            <th class="p-4 w-1/3">รายการสินค้า</th>
                            <th class="p-4 w-1/5">ราคารับซื้อ (฿/kg)</th>
                            <th class="p-4 w-1/5">ราคาขายออก (฿/kg)</th>
                            <th class="p-4 w-1/6">อัปเดตล่าสุด</th>
                            <th class="p-4 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <!-- เราจะใช้ JS ยัดข้อมูลลงใน tbody นี้ -->
                    <tbody id="price-table-body" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-slate-400">กำลังโหลดข้อมูล...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- แจ้งเตือน Toast มุมขวาล่าง -->
        <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center gap-2">
            ✅ <span id="toast-msg">บันทึกสำเร็จ</span>
        </div>
    </main>

    <!-- เรียกใช้ Script -->
    <script type="module" src="../js/prices.js"></script>
</body>
</html>
