<!-- pages/prices.html -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- บังคับไม่ให้ Zoom ซูมหน้าจอเวลาจิ้ม Input บนมือถือ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บอร์ดราคา - Scrap POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons (ไอคอนสวยๆ) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* จัดการ Font และซ่อนลูกศร Input Number */
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type="number"]::-webkit-outer-spin-button, input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        
        /* เว้นที่ว่างด้านล่างกัน Bottom Nav บัง Card */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 90px); }
        
        /* Animation แฟลชสีเขียวตอนราคาเด้งเปลี่ยน (ปรับให้เหมาะกับ Card) */
        .flash-update { animation: flashCard 1.5s ease-out; }
        @keyframes flashCard {
            0% { background-color: #bbf7d0; border-color: #22c55e; transform: scale(1.02); }
            100% { background-color: white; border-color: #e2e8f0; transform: scale(1); }
        }

        /* ซ่อน Scrollbar สำหรับเมนูแนวนอนมือถือ */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">
    
    <!-- พื้นที่สำหรับ Sidebar (ซ่อนบนมือถือ โชว์เฉพาะจอใหญ่ lg ขึ้นไป) -->
    <div id="sidebar-container" class="hidden lg:block w-64 h-full bg-[#1e293b] shrink-0"></div>

    <!-- พื้นที่หลัก -->
    <main class="flex-1 flex flex-col h-full relative w-full">
        
        <!-- Mobile Header (แสดงเฉพาะบนมือถือ) -->
        <header class="lg:hidden bg-[#1e293b] text-white p-4 flex justify-between items-center shadow-md z-10 shrink-0">
            <div class="flex items-center gap-2">
                <i class="ph-fill ph-recycle text-green-400 text-2xl"></i>
                <h1 class="text-lg font-bold">บอร์ดราคา</h1>
            </div>
            <!-- สถานะ Realtime แบบย่อบนมือถือ -->
            <div id="mobile-connection-status" class="flex items-center gap-1 bg-amber-500/20 text-amber-400 px-2 py-1 rounded-full text-[10px] font-medium border border-amber-500/30">
                <div class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></div> โหลด...
            </div>
        </header>

        <!-- Desktop Header -->
        <header class="hidden lg:flex bg-white shadow-sm px-8 py-5 justify-between items-center z-10 shrink-0">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="ph-fill ph-chart-line-up text-blue-600"></i> บอร์ดราคาตลาด
                </h1>
                <p class="text-slate-500 text-sm mt-1">จัดการราคารับซื้อ-ขายออก ประจำวัน</p>
            </div>
            <div id="desktop-connection-status" class="flex items-center gap-2 bg-amber-100 text-amber-700 px-4 py-2 rounded-full text-sm font-medium transition-colors">
                <div class="w-2.5 h-2.5 rounded-full bg-amber-500 animate-pulse"></div> กำลังเชื่อมต่อ...
            </div>
        </header>

        <!-- Content (เปลี่ยนเป็น Card Grid) -->
        <div class="p-4 lg:p-8 overflow-y-auto flex-1 pb-safe">
            <!-- คอนเทนเนอร์สำหรับใส่ Card -->
            <div id="price-card-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                <!-- โหลดดิ้งเริ่มต้น -->
                <div class="col-span-full p-8 text-center text-slate-400 flex flex-col items-center justify-center h-40">
                    <i class="ph ph-spinner-gap animate-spin text-4xl mb-2"></i>
                    กำลังโหลดข้อมูลราคา...
                </div>
            </div>
        </div>

        <!-- 📱 Bottom Navigation (แทน Sidebar บนมือถือ - เลื่อนซ้ายขวาได้) -->
        <nav class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-[env(safe-area-inset-bottom)] z-40">
            <div class="flex overflow-x-auto hide-scrollbar scroll-smooth">
                
                <!-- 1. รับซื้อของเข้า -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-slate-400 hover:text-green-600 active:bg-slate-50 transition">
                    <i class="ph ph-download-simple text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium">รับซื้อ</span>
                </a>

                <!-- 2. ขายออกโรงงาน -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-slate-400 hover:text-green-600 active:bg-slate-50 transition">
                    <i class="ph ph-upload-simple text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium">ขายออก</span>
                </a>

                <!-- 3. คัดแยก / แปรรูป -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-slate-400 hover:text-green-600 active:bg-slate-50 transition">
                    <i class="ph ph-recycle text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium whitespace-nowrap">คัดแยก</span>
                </a>

                <!-- 4. บอร์ดราคาตลาด (Active สีเขียว) -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-green-600 bg-green-50/50">
                    <i class="ph-fill ph-chart-line-up text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium whitespace-nowrap">บอร์ดราคา</span>
                </a>

                <!-- 5. สต๊อกคงเหลือ -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-slate-400 hover:text-green-600 active:bg-slate-50 transition">
                    <i class="ph ph-package text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium">สต๊อก</span>
                </a>

                <!-- 6. เงินสดย่อย / ปิดกะ -->
                <a href="#" class="shrink-0 min-w-[76px] px-2 flex flex-col items-center justify-center py-3 text-slate-400 hover:text-green-600 active:bg-slate-50 transition">
                    <i class="ph ph-money text-2xl mb-1"></i>
                    <span class="text-[10px] font-medium whitespace-nowrap">ปิดกะ</span>
                </a>

                <!-- ช่องว่างเผื่อท้ายสุด -->
                <div class="shrink-0 w-2"></div>
            </div>
        </nav>

        <!-- แจ้งเตือน Toast (ปรับให้อยู่เหนือ Bottom Nav บนมือถือ) -->
        <div id="toast" class="fixed bottom-24 lg:bottom-5 right-1/2 translate-x-1/2 lg:right-5 lg:translate-x-0 transform translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl z-50 flex items-center gap-2 whitespace-nowrap text-sm font-medium pointer-events-none">
            <i class="ph-fill ph-check-circle text-green-400 text-xl"></i> <span id="toast-msg">บันทึกสำเร็จ</span>
        </div>
    </main>

    <script type="module" src="../js/prices.js"></script>
</body>
</html>
