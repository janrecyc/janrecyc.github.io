<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScrapPOS — คัดแยก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --ink:       #0A0A0F;
  --ink2:      #3A3A4A;
  --ink3:      #8A8A9A;
  --surface:   #F5F5FA;
  --white:     #FFFFFF;
  --primary:   #00B86B;
  --primary-d: #008F52;
  --primary-l: rgba(0,184,107,0.10);
  --green:     #00C853;
  --red:       #FF3B30;
  --amber:     #FF9F0A;
  --blue:      #1A6BFF;
  --card-sh:   0 2px 20px rgba(10,10,30,0.07), 0 0 0 0.5px rgba(10,10,30,0.06);
  --r: 20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:'Prompt',sans-serif;
  background:var(--surface);
  color:var(--ink);
  height:100dvh;
  display:flex; flex-direction:column;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

.status-bar{height:env(safe-area-inset-top,0px);background:var(--white);flex-shrink:0;}

/* ── HEADER ── */
header {
  background:var(--white);
  padding:14px 20px 12px;
  flex-shrink:0;
  border-bottom:1px solid rgba(10,10,30,0.06);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.app-logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:32px;height:32px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;}
.app-name{font-size:13px;font-weight:700;color:var(--ink3);letter-spacing:2px;text-transform:uppercase;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:none;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:18px;cursor:pointer;}
.icon-btn:active{background:#e8e8f0;}
.page-title{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;line-height:1.1;}
.page-sub{font-size:12px;color:var(--ink3);font-weight:400;margin-left:2px;}



/* ── APP BODY ── */
.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}

/* ── PANELS ── */
.panel{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden;}
.panel.active{display:flex;}

/* ════════════════════════════
   STEP 1 — เลือกวัตถุดิบ
   ════════════════════════════ */
.search-area{padding:10px 16px 0;flex-shrink:0;}
.search-field{display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid rgba(10,10,30,0.08);border-radius:14px;padding:10px 14px;box-shadow:0 1px 6px rgba(10,10,30,0.05);transition:border-color .15s,box-shadow .15s;}
.search-field:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,184,107,0.12);}
.search-field i{color:var(--ink3);font-size:17px;}
.search-field input{flex:1;border:none;outline:none;font-family:'Prompt',sans-serif;font-size:14px;color:var(--ink);background:transparent;}
.search-field input::placeholder{color:var(--ink3);}

.cat-bar{display:flex;gap:6px;padding:8px 16px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:100px;font-family:'Prompt',sans-serif;font-size:12px;font-weight:500;border:none;cursor:pointer;transition:all .16s;white-space:nowrap;}
.cat-btn.on{background:var(--ink);color:white;box-shadow:0 2px 8px rgba(10,10,30,0.2);}
.cat-btn:not(.on){background:var(--white);color:var(--ink2);border:1px solid rgba(10,10,30,0.08);}

.item-grid-wrap{flex:1;overflow-y:auto;padding:4px 12px 8px;scrollbar-width:none;}
.item-grid-wrap::-webkit-scrollbar{display:none;}
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:500px){.item-grid{grid-template-columns:repeat(3,1fr);}}

.item-card{background:var(--white);border-radius:var(--r);padding:16px 14px 14px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--card-sh);transition:transform .13s,box-shadow .13s;border:1.5px solid transparent;display:flex;flex-direction:column;gap:8px;user-select:none;}
.item-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.7) 0%,transparent 50%);pointer-events:none;}
.item-card:active{transform:scale(0.95);}
.item-card.selected{border-color:var(--primary);box-shadow:0 8px 32px rgba(0,184,107,0.18),0 0 0 1.5px var(--primary);}
.card-check{position:absolute;top:10px;right:10px;width:22px;height:22px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;opacity:0;transform:scale(0.6);transition:all .18s;}
.item-card.selected .card-check{opacity:1;transform:scale(1);}
.card-icon{font-size:32px;line-height:1;}
.card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
.card-stock{font-size:10px;}

.grid-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:50px 0;color:var(--ink3);}
.grid-empty i{font-size:32px;opacity:.4;}
.grid-empty p{font-size:13px;}

/* ── BOTTOM BAR ── */
.bottom-bar{flex-shrink:0;background:var(--white);border-top:1px solid rgba(10,10,30,0.06);padding:10px 16px calc(env(safe-area-inset-bottom,0px)+6px);display:flex;align-items:center;gap:12px;}
.bottom-bar-info{flex:1;min-width:0;}
.bottom-bar-title{font-size:13px;font-weight:700;color:var(--ink);}
.bottom-bar-sub{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ── KG BAR ── */
.kg-bar-wrap{flex-shrink:0;background:rgba(0,184,107,0.06);border-top:1px solid rgba(0,184,107,0.15);padding:10px 16px 6px;display:none;}
.kg-bar-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.kg-bar-label{font-size:12px;font-weight:700;color:var(--ink);}
.kg-bar-stock{font-size:11px;font-weight:500;}
.kg-stepper{display:flex;align-items:center;gap:8px;}
.ks-btn{width:36px;height:36px;border-radius:50%;background:var(--white);border:1.5px solid rgba(10,10,30,0.1);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;transition:all .12s;}
.ks-btn:active{background:var(--primary);border-color:var(--primary);color:white;}
.ks-input{width:80px;text-align:center;font-family:'Prompt',sans-serif;font-size:18px;font-weight:800;color:var(--ink);border:1.5px solid rgba(10,10,30,0.1);border-radius:12px;padding:7px 4px;background:var(--white);outline:none;}
.ks-input:focus{border-color:var(--primary);background:var(--white);}
.kg-unit{font-size:13px;color:var(--ink3);font-weight:500;}

.next-btn{padding:12px 20px;border-radius:14px;background:var(--primary);color:white;border:none;font-family:'Prompt',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.next-btn:disabled{opacity:.35;pointer-events:none;}
.next-btn:active{background:var(--primary-d);}

/* ════════════════════════════
   STEP 2 — เลือกผลลัพธ์
   ════════════════════════════ */
.from-chip{display:flex;align-items:center;gap:8px;background:var(--primary-l);border:1px solid rgba(0,184,107,0.2);border-radius:14px;padding:10px 14px;margin:10px 16px 0;flex-shrink:0;}
.from-chip-icon{font-size:20px;}
.from-chip-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;}
.from-chip-kg{font-size:12px;font-weight:700;color:var(--primary);background:rgba(0,184,107,0.15);padding:3px 10px;border-radius:100px;white-space:nowrap;}

.section-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;padding:8px 16px 6px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.section-label::after{content:'';flex:1;height:1px;background:rgba(10,10,30,0.06);}

.result-grid-wrap{flex:1;overflow-y:auto;padding:0 12px 8px;scrollbar-width:none;}
.result-grid-wrap::-webkit-scrollbar{display:none;}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:500px){.result-grid{grid-template-columns:repeat(3,1fr);}}

.result-card{background:var(--white);border-radius:16px;padding:14px 12px 12px;cursor:pointer;border:1.5px solid transparent;box-shadow:var(--card-sh);display:flex;flex-direction:column;gap:6px;transition:transform .13s,box-shadow .13s;position:relative;overflow:hidden;user-select:none;}
.result-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.7) 0%,transparent 50%);pointer-events:none;}
.result-card:active{transform:scale(0.95);}
.result-card.selected{border-color:var(--primary);box-shadow:0 8px 32px rgba(0,184,107,0.18),0 0 0 1.5px var(--primary);}
.result-card .card-check{position:absolute;top:8px;right:8px;width:20px;height:20px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;opacity:0;transform:scale(0.6);transition:all .18s;}
.result-card.selected .card-check{opacity:1;transform:scale(1);}
.result-icon{font-size:28px;line-height:1;}
.result-name{font-size:12px;font-weight:700;color:var(--ink);}
.result-price{font-size:12px;font-weight:700;color:var(--primary);}
.result-price-unit{font-size:10px;font-weight:400;color:var(--ink3);}

.sel-count-badge{display:inline-flex;align-items:center;gap:4px;background:var(--primary);color:white;border-radius:100px;padding:2px 10px;font-size:11px;font-weight:700;}

/* ════════════════════════════
   STEP 3 — ใส่น้ำหนัก
   ════════════════════════════ */
.weight-wrap{flex:1;overflow-y:auto;padding:0 12px 8px;scrollbar-width:none;}
.weight-wrap::-webkit-scrollbar{display:none;}

.weight-item{background:var(--white);border-radius:16px;padding:14px;margin-bottom:10px;box-shadow:var(--card-sh);display:flex;align-items:center;gap:12px;}
.wi-icon{font-size:28px;flex-shrink:0;}
.wi-info{flex:1;min-width:0;}
.wi-name{font-size:13px;font-weight:700;color:var(--ink);}
.wi-price{font-size:11px;color:var(--ink3);margin-top:2px;}
.wi-stepper{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.wi-btn{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1.5px solid rgba(10,10,30,0.08);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:all .12s;}
.wi-btn:active{background:var(--primary);border-color:var(--primary);color:white;}
.wi-inp{width:64px;text-align:center;font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;border:1.5px solid rgba(10,10,30,0.08);border-radius:10px;padding:6px 3px;background:var(--surface);outline:none;color:var(--ink);}
.wi-inp:focus{border-color:var(--primary);background:var(--white);}
.wi-remove{width:30px;height:30px;border-radius:50%;background:rgba(255,59,48,0.08);border:none;color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wi-remove:active{background:rgba(255,59,48,0.2);}

.total-card{background:var(--primary-l);border:1px solid rgba(0,184,107,0.2);border-radius:16px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:12px;font-weight:600;color:var(--primary);}
.total-val{font-size:18px;font-weight:800;color:var(--primary);}

/* ── PANEL FOOTER ── */
.panel-footer{flex-shrink:0;padding:10px 16px calc(env(safe-area-inset-bottom,0px)+8px);border-top:1px solid rgba(10,10,30,0.06);background:var(--white);}
.footer-row{display:flex;gap:10px;}
.btn-back{flex:1;padding:14px;border-radius:16px;background:var(--surface);border:1px solid rgba(10,10,30,0.08);font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-back:active{background:#e0e0ea;}
.btn-confirm{flex:2;padding:14px;border-radius:16px;background:var(--primary);border:none;color:white;font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:background .15s;}
.btn-confirm:disabled{opacity:.35;pointer-events:none;}
.btn-confirm:active{background:var(--primary-d);}

/* ── NAV ── */
nav{background:var(--white);border-top:1px solid rgba(10,10,30,0.06);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);}
.nav-row{display:flex;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px 6px;text-decoration:none;color:var(--ink3);font-size:10px;font-weight:500;position:relative;}
.nav-tab.on{color:var(--primary);}
.nav-tab i{font-size:20px;}
.nav-tab-indicator{position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--primary);border-radius:0 0 2px 2px;transition:width .2s;}
.nav-tab.on .nav-tab-indicator{width:24px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(10,10,30,0.88);color:white;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(8px);z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{background:rgba(0,184,107,0.92);}
#toast.error{background:rgba(255,59,48,0.9);}

.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="status-bar"></div>

<header>
  <div class="header-top">
    <div class="app-logo">
      <div class="logo-mark"><i class="ph ph-recycle"></i></div>
      <span class="app-name">ScrapPOS</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="icon-btn" onclick="resetAll()" title="เริ่มใหม่"><i class="ph ph-arrows-counter-clockwise"></i></button>
      <button class="icon-btn" onclick="window.AUTH && window.AUTH.logout()" title="ออกจากระบบ"><i class="ph ph-sign-out"></i></button>
    </div>
  </div>
  <div class="page-title">คัดแยก <span class="page-sub">Sort</span></div>
</header>



<div class="app-body">

  <!-- ══ STEP 1: เลือกวัตถุดิบ + น้ำหนัก ══ -->
  <div class="panel active" id="panel-1">
    <div class="search-area">
      <div class="search-field">
        <i class="ph ph-magnifying-glass"></i>
        <input type="text" id="search-1" placeholder="ค้นหาวัตถุดิบ...">
      </div>
    </div>
    <div class="cat-bar">
      <button class="cat-btn on" data-cat="all">ทั้งหมด</button>
      <button class="cat-btn" data-cat="metal">🔩 โลหะ</button>
      <button class="cat-btn" data-cat="paper">📰 กระดาษ</button>
      <button class="cat-btn" data-cat="plastic">♻️ พลาสติก</button>
      <button class="cat-btn" data-cat="glass">🪟 แก้ว</button>
      <button class="cat-btn" data-cat="electric">⚡ ไฟฟ้า</button>
    </div>
    <div class="item-grid-wrap">
      <div class="item-grid" id="grid-1">
        <div class="grid-empty">
          <i class="ph ph-spinner-gap spin"></i>
          <p>กำลังโหลด...</p>
        </div>
      </div>
    </div>

    <!-- ส่วนล่าง: ยังไม่เลือก -->
    <div class="bottom-bar" id="bar-idle">
      <div class="bottom-bar-info">
        <div class="bottom-bar-title">ยังไม่ได้เลือกวัตถุดิบ</div>
        <div class="bottom-bar-sub">กดเลือกสินค้าด้านบน</div>
      </div>
      <button class="next-btn" disabled>ถัดไป <i class="ph ph-arrow-right"></i></button>
    </div>

    <!-- ส่วนล่าง: เลือกแล้ว → กรอก kg -->
    <div id="bar-kg" style="display:none;">
      <div class="kg-bar-wrap" id="kg-bar-wrap" style="display:block;">
        <div class="kg-bar-label-row">
          <span class="kg-bar-label" id="kg-bar-item-name">–</span>
          <span class="kg-bar-stock" id="kg-bar-stock"></span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:12px;color:var(--ink3);font-weight:500;">น้ำหนักที่จะคัดแยก</span>
          <div class="kg-stepper" style="flex:1;justify-content:flex-end;">
            <button class="ks-btn" onclick="stepKg(-1)">−</button>
            <input class="ks-input" type="number" id="from-kg" value="0" min="0.1" step="0.1" oninput="onKgInput()">
            <span class="kg-unit">กก.</span>
            <button class="ks-btn" onclick="stepKg(1)">+</button>
          </div>
        </div>
      </div>
      <div class="bottom-bar">
        <div class="bottom-bar-info">
          <div class="bottom-bar-title" id="sel-item-name-bar">–</div>
          <div class="bottom-bar-sub" id="sel-item-sub-bar">กรอกน้ำหนักที่ต้องการคัดแยก</div>
        </div>
        <button class="next-btn" id="btn-next-1" disabled onclick="goStep(2)">
          ถัดไป <i class="ph ph-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ STEP 2: เลือกผลลัพธ์ ══ -->
  <div class="panel" id="panel-2">
    <!-- chip วัตถุดิบ -->
    <div class="from-chip">
      <span class="from-chip-icon" id="s2-from-icon">📦</span>
      <span class="from-chip-name" id="s2-from-name">–</span>
      <span class="from-chip-kg" id="s2-from-kg">0 กก.</span>
    </div>

    <div class="section-label">
      คัดแยกได้สินค้าอะไรบ้าง
      <span id="sel-count-wrap" style="display:none;">
        <span class="sel-count-badge" id="sel-count-text"></span>
      </span>
    </div>

    <div class="result-grid-wrap">
      <div class="result-grid" id="grid-2">
        <div class="grid-empty" style="grid-column:1/-1;">
          <i class="ph ph-spinner-gap spin"></i>
          <p>กำลังโหลด...</p>
        </div>
      </div>
    </div>

    <div class="panel-footer">
      <div class="footer-row">
        <button class="btn-back" onclick="goStep(1)"><i class="ph ph-arrow-left"></i> ย้อนกลับ</button>
        <button class="btn-confirm" id="btn-next-2" disabled onclick="goStep(3)">
          ใส่น้ำหนัก <i class="ph ph-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- ══ STEP 3: ใส่น้ำหนักผลลัพธ์ ══ -->
  <div class="panel" id="panel-3">
    <!-- chip วัตถุดิบ -->
    <div class="from-chip">
      <span class="from-chip-icon" id="s3-from-icon">📦</span>
      <span class="from-chip-name" id="s3-from-name">–</span>
      <span class="from-chip-kg" id="s3-from-kg">0 กก.</span>
    </div>

    <div class="section-label">ใส่น้ำหนักแต่ละชนิด</div>

    <div class="weight-wrap" id="weight-wrap">
      <!-- rows จะ render ที่นี่ -->
      <div class="total-card" id="total-card">
        <span class="total-label">มูลค่ารวมโดยประมาณ</span>
        <span class="total-val" id="total-val">฿0.00</span>
      </div>
    </div>

    <div class="panel-footer">
      <div class="footer-row">
        <button class="btn-back" onclick="goStep(2)"><i class="ph ph-arrow-left"></i> ย้อนกลับ</button>
        <button class="btn-confirm" id="btn-save" disabled onclick="saveSort()">
          <i class="ph ph-check-circle"></i> บันทึก
        </button>
      </div>
    </div>
  </div>

</div><!-- /app-body -->

<!-- NAV -->
<nav>
  <div class="nav-row">
    <a href="buy.html" class="nav-tab">
      <div class="nav-tab-indicator"></div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://dhvbbdcsejtvgilcgpfh.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRodmJiZGNzZWp0dmdpbGNncGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTEwMTMsImV4cCI6MjA5MzY2NzAxM30.B8TSWtXjf6A-Uq1f_JWf2Ghg2I2pCM2N1PV3r8yBlrs';

// ══════════════════════════════════════════
//  DEMO DATA
// ══════════════════════════════════════════
const DEMO_ITEMS = [
  {id:1,  name:'เหล็กหนัก',          icon:'🔩', buy_price:4.50, sell_price:5.80, stock_qty:4200, cat:'metal'},
  {id:2,  name:'เหล็กบาง',           icon:'🔧', buy_price:2.80, sell_price:3.50, stock_qty:1800, cat:'metal'},
  {id:3,  name:'ทองแดง',             icon:'🪙', buy_price:195,  sell_price:215,  stock_qty:320,  cat:'metal'},
  {id:4,  name:'อลูมิเนียม',         icon:'🫗', buy_price:42,   sell_price:50,   stock_qty:960,  cat:'metal'},
  {id:5,  name:'สแตนเลส',            icon:'⚙️', buy_price:18,   sell_price:22,   stock_qty:550,  cat:'metal'},
  {id:6,  name:'กระดาษหนังสือพิมพ์', icon:'📰', buy_price:2.20, sell_price:2.80, stock_qty:3000, cat:'paper'},
  {id:7,  name:'กระดาษลัง',          icon:'📦', buy_price:2.50, sell_price:3.20, stock_qty:5200, cat:'paper'},
  {id:8,  name:'กระดาษขาว',          icon:'📄', buy_price:3.00, sell_price:3.80, stock_qty:1100, cat:'paper'},
  {id:9,  name:'พลาสติกขาว',         icon:'🥛', buy_price:8.50, sell_price:11,   stock_qty:780,  cat:'plastic'},
  {id:10, name:'ขวด PET',            icon:'🍶', buy_price:6.00, sell_price:8.00, stock_qty:620,  cat:'plastic'},
  {id:11, name:'แก้วใส',             icon:'🪟', buy_price:1.20, sell_price:1.60, stock_qty:2100, cat:'glass'},
  {id:12, name:'สายไฟทองแดง',        icon:'🔌', buy_price:85,   sell_price:100,  stock_qty:180,  cat:'electric'},
  {id:13, name:'มอเตอร์เก่า',        icon:'⚡', buy_price:25,   sell_price:32,   stock_qty:95,   cat:'electric'},
];

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let ALL_ITEMS    = [];
let selectedFrom = null;
let selectedTos  = {};   // { id: { item, kg } }
let activeCat    = 'all';
let q1           = '';
let currentStep  = 1;

// ══════════════════════════════════════════
//  SUPABASE FETCH
// ══════════════════════════════════════════
async function sbFetch(path, opts = {}) {
  const token = (window.AUTH && window.AUTH.token) ? window.AUTH.token : SUPABASE_ANON;
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers,
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ══════════════════════════════════════════
//  LOAD ITEMS
// ══════════════════════════════════════════
async function loadItems() {
  const SUPABASE_READY = !SUPABASE_URL.includes('YOUR_PROJECT');
  if (!SUPABASE_READY) {
    ALL_ITEMS = DEMO_ITEMS;
  } else {
    try {
      ALL_ITEMS = await sbFetch('items?select=id,name,icon,buy_price,sell_price,stock_qty,cat&order=cat,name');
    } catch (err) {
      ALL_ITEMS = DEMO_ITEMS;
      toast('โหลดไม่สำเร็จ ใช้ข้อมูล Demo', 'error');
    }
  }
  renderGrid1();
}

// ══════════════════════════════════════════
//  STEP 1 — เลือกวัตถุดิบ
// ══════════════════════════════════════════
function renderGrid1() {
  const grid = document.getElementById('grid-1');
  let list = ALL_ITEMS;
  if (activeCat !== 'all') list = list.filter(x => x.cat === activeCat);
  if (q1) list = list.filter(x => x.name.includes(q1));

  if (!list.length) {
    grid.innerHTML = `<div class="grid-empty"><i class="ph ph-magnifying-glass"></i><p>ไม่พบสินค้า</p></div>`;
    return;
  }

  grid.innerHTML = list.map(item => {
    const sel   = selectedFrom && selectedFrom.id === item.id;
    const stock = Number(item.stock_qty || 0);
    const empty = stock <= 0;
    const stockColor = empty ? 'color:var(--red)' : stock < 100 ? 'color:var(--amber)' : 'color:var(--green)';
    return `
    <div class="item-card ${sel ? 'selected' : ''} ${empty ? 'disabled-card' : ''}"
      onclick="${empty ? `toast('สต๊อกหมด','error')` : `selectFrom(${item.id})`}"
      style="${empty ? 'opacity:.45;' : ''}">
      <div class="card-check"><i class="ph ph-check-bold"></i></div>
      <div class="card-icon">${item.icon}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-stock" style="${stockColor}">
        ${empty ? '❌ หมดสต๊อก' : stock.toLocaleString('th-TH') + ' กก.'}
      </div>
    </div>`;
  }).join('');
}

function selectFrom(id) {
  selectedFrom = ALL_ITEMS.find(x => x.id === id);
  renderGrid1();

  const stock = Number(selectedFrom.stock_qty || 0);

  // แสดง kg-bar
  document.getElementById('bar-idle').style.display = 'none';
  document.getElementById('bar-kg').style.display   = 'block';
  document.getElementById('kg-bar-item-name').textContent = selectedFrom.name;
  document.getElementById('sel-item-name-bar').textContent = `${selectedFrom.icon} ${selectedFrom.name}`;
  document.getElementById('sel-item-sub-bar').textContent  = 'กรอกน้ำหนักที่ต้องการคัดแยก';

  const stockEl = document.getElementById('kg-bar-stock');
  stockEl.textContent = `สต๊อก ${stock.toLocaleString('th-TH')} กก.`;
  stockEl.style.color = stock < 100 ? 'var(--amber)' : 'var(--green)';

  const inp = document.getElementById('from-kg');
  inp.value = '';
  inp.max   = stock;
  document.getElementById('btn-next-1').disabled = true;
}

function stepKg(delta) {
  const inp   = document.getElementById('from-kg');
  const stock = Number(selectedFrom?.stock_qty || 0);
  let val = Math.round(((parseFloat(inp.value) || 0) + delta * 0.1) * 10) / 10;
  val = Math.min(stock, Math.max(0.1, val));
  inp.value = val;
  onKgInput();
}

function onKgInput() {
  const inp   = document.getElementById('from-kg');
  const stock = Number(selectedFrom?.stock_qty || 0);
  let val = parseFloat(inp.value) || 0;
  if (val > stock) { val = stock; inp.value = stock; }
  // ต้องมากกว่า 0.1 กก. ขึ้นไป
  document.getElementById('btn-next-1').disabled = val < 0.1;
}

// ══════════════════════════════════════════
//  STEP 2 — เลือกผลลัพธ์
// ══════════════════════════════════════════
function renderGrid2() {
  // อัปเดต chip
  document.getElementById('s2-from-icon').textContent = selectedFrom.icon;
  document.getElementById('s2-from-name').textContent = selectedFrom.name;
  document.getElementById('s2-from-kg').textContent   = getFromKg() + ' กก.';

  const grid = document.getElementById('grid-2');
  // แสดงสินค้าทั้งหมดยกเว้นวัตถุดิบที่เลือก
  const list = ALL_ITEMS.filter(x => x.id !== selectedFrom.id);

  if (!list.length) {
    grid.innerHTML = `<div class="grid-empty" style="grid-column:1/-1;"><i class="ph ph-package"></i><p>ไม่มีสินค้าอื่น</p></div>`;
    return;
  }

  // จัดกลุ่มตาม cat
  const cats = [...new Set(list.map(x => x.cat))];
  const catLabel = {metal:'โลหะ',paper:'กระดาษ',plastic:'พลาสติก',glass:'แก้ว',electric:'ไฟฟ้า'};
  const catEmoji = {metal:'🔩',paper:'📰',plastic:'♻️',glass:'🪟',electric:'⚡'};

  grid.innerHTML = cats.map(cat => {
    const items = list.filter(x => x.cat === cat);
    return `
    <div style="grid-column:1/-1;padding-top:6px;">
      <div style="font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;padding:0 4px 6px;">${catEmoji[cat]||''} ${catLabel[cat]||cat}</div>
    </div>
    ${items.map(item => {
      const sel = !!selectedTos[item.id];
      return `
      <div class="result-card ${sel ? 'selected' : ''}" onclick="toggleTo(${item.id})">
        <div class="card-check"><i class="ph ph-check-bold"></i></div>
        <div class="result-icon">${item.icon}</div>
        <div class="result-name">${item.name}</div>
        <div class="result-price">฿${Number(item.sell_price).toFixed(2)}<span class="result-price-unit">/กก.</span></div>
      </div>`;
    }).join('')}`;
  }).join('');

  updateStep2Footer();
}

function toggleTo(id) {
  const item = ALL_ITEMS.find(x => x.id === id);
  if (!item) return;
  if (selectedTos[id]) {
    delete selectedTos[id];
  } else {
    selectedTos[id] = { item, kg: 0 };
  }
  // re-render เฉพาะ card ที่คลิก ไม่ต้อง render ทั้ง grid
  const cards = document.querySelectorAll('#grid-2 .result-card');
  // หา index ใน list
  const list = ALL_ITEMS.filter(x => x.id !== selectedFrom.id);
  const idx  = list.findIndex(x => x.id === id);
  if (cards[idx]) {
    cards[idx].classList.toggle('selected', !!selectedTos[id]);
  }
  updateStep2Footer();
}

function updateStep2Footer() {
  const count = Object.keys(selectedTos).length;
  const btn   = document.getElementById('btn-next-2');
  const badge = document.getElementById('sel-count-wrap');
  const text  = document.getElementById('sel-count-text');
  btn.disabled = count === 0;
  if (count > 0) {
    badge.style.display = 'inline-flex';
    text.textContent = `${count} ชนิด`;
  } else {
    badge.style.display = 'none';
  }
}

// ══════════════════════════════════════════
//  STEP 3 — ใส่น้ำหนัก
// ══════════════════════════════════════════
function renderStep3() {
  document.getElementById('s3-from-icon').textContent = selectedFrom.icon;
  document.getElementById('s3-from-name').textContent = selectedFrom.name;
  document.getElementById('s3-from-kg').textContent   = getFromKg() + ' กก.';

  const wrap = document.getElementById('weight-wrap');
  const totalCard = document.getElementById('total-card');

  // สร้าง rows สำหรับแต่ละสินค้าที่เลือก
  const rowsHtml = Object.values(selectedTos).map(t => `
    <div class="weight-item" id="wi-${t.item.id}">
      <div class="wi-icon">${t.item.icon}</div>
      <div class="wi-info">
        <div class="wi-name">${t.item.name}</div>
        <div class="wi-price">฿${Number(t.item.sell_price).toFixed(2)}/กก.</div>
      </div>
      <div class="wi-stepper">
        <button class="wi-btn" onclick="adjTo(${t.item.id}, -0.1)">−</button>
        <input class="wi-inp" type="number" id="to-kg-${t.item.id}"
          value="${t.kg || ''}" min="0" step="0.1" placeholder="0"
          oninput="onToKg(${t.item.id})">
        <button class="wi-btn" onclick="adjTo(${t.item.id}, 0.1)">+</button>
      </div>
      <button class="wi-remove" onclick="removeTo(${t.item.id})" title="ลบ">
        <i class="ph ph-x-bold"></i>
      </button>
    </div>
  `).join('');

  wrap.innerHTML = rowsHtml;
  wrap.appendChild(totalCard);

  updateTotalYield();
}

function adjTo(id, delta) {
  if (!selectedTos[id]) return;
  const inp = document.getElementById(`to-kg-${id}`);
  let val = Math.round(((parseFloat(inp.value) || 0) + delta) * 10) / 10;
  val = Math.max(0, val);
  inp.value = val || '';
  selectedTos[id].kg = val;
  updateTotalYield();
}

function onToKg(id) {
  const inp = document.getElementById(`to-kg-${id}`);
  const val = Math.max(0, parseFloat(inp.value) || 0);
  if (selectedTos[id]) selectedTos[id].kg = val;
  updateTotalYield();
}

function removeTo(id) {
  delete selectedTos[id];
  const el = document.getElementById(`wi-${id}`);
  if (el) el.remove();
  updateTotalYield();
  // ถ้าไม่เหลือเลย ย้อนกลับ step2
  if (!Object.keys(selectedTos).length) {
    toast('กรุณาเลือกผลลัพธ์อย่างน้อย 1 ชนิด', 'error');
    goStep(2);
  }
}

function updateTotalYield() {
  let total = 0;
  Object.values(selectedTos).forEach(t => {
    total += (t.kg || 0) * Number(t.item.sell_price);
  });
  document.getElementById('total-val').textContent =
    '฿' + total.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});

  const hasKg = Object.values(selectedTos).some(t => t.kg > 0);
  document.getElementById('btn-save').disabled = !hasKg;
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function getFromKg() {
  return parseFloat(document.getElementById('from-kg').value) || 0;
}

function goStep(n) {
  // ซ่อน panel ปัจจุบัน
  document.getElementById(`panel-${currentStep}`).classList.remove('active');
  // แสดง panel ใหม่
  document.getElementById(`panel-${n}`).classList.add('active');
  currentStep = n;
  updateStepBar(n);

  if (n === 2) renderGrid2();
  if (n === 3) renderStep3();
}

function updateStepBar(n) { /* ไม่ใช้แล้ว */ }

// ══════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════
async function saveSort() {
  const fromKg    = getFromKg();
  const fromStock = Number(selectedFrom.stock_qty || 0);
  const results   = Object.values(selectedTos).filter(t => t.kg > 0);

  if (fromKg < 0.1) { toast('กรุณากรอกน้ำหนักวัตถุดิบอย่างน้อย 0.1 กก.', 'error'); return; }
  if (fromKg > fromStock) {
    toast(`❌ สต๊อก${selectedFrom.name}มีแค่ ${fromStock.toLocaleString('th-TH')} กก.`, 'error');
    return;
  }
  if (!results.length) { toast('กรุณาใส่น้ำหนักผลลัพธ์อย่างน้อย 1 ชนิด', 'error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="ph ph-spinner-gap spin"></i> กำลังบันทึก...';

  const SUPABASE_READY = !SUPABASE_URL.includes('YOUR_PROJECT');

  if (!SUPABASE_READY) {
    // Demo mode
    await new Promise(r => setTimeout(r, 600));
    const fi = ALL_ITEMS.find(x => x.id === selectedFrom.id);
    if (fi) fi.stock_qty = Math.max(0, Number(fi.stock_qty) - fromKg);
    results.forEach(t => {
      const ti = ALL_ITEMS.find(x => x.id === t.item.id);
      if (ti) ti.stock_qty = Number(ti.stock_qty || 0) + t.kg;
    });
    const summary = results.map(t => `${t.item.name} +${t.kg}กก.`).join(', ');
    toast(`✅ ${selectedFrom.name} −${fromKg}กก. → ${summary}`, 'success');
    setTimeout(resetAll, 1800);
    return;
  }

  try {
    // 1. บันทึก sort_logs
    for (const t of results) {
      await sbFetch('sort_logs', {
        method: 'POST', prefer: 'return=minimal',
        body: {
          from_item_id:   selectedFrom.id,
          from_item_name: selectedFrom.name,
          to_item_id:     t.item.id,
          to_item_name:   t.item.name,
          sort_kg:        fromKg,
          result_kg:      t.kg,
          result_value:   t.kg * Number(t.item.sell_price),
          created_at:     new Date().toISOString(),
        },
      });
    }
    // 2. หัก stock วัตถุดิบ
    await sbFetch(`items?id=eq.${selectedFrom.id}`, {
      method: 'PATCH', prefer: 'return=minimal',
      body: { stock_qty: Math.max(0, fromStock - fromKg), updated_at: new Date().toISOString() },
    });
    // 3. เพิ่ม stock ผลลัพธ์
    for (const t of results) {
      const ti  = ALL_ITEMS.find(x => x.id === t.item.id);
      const cur = Number(ti?.stock_qty || 0);
      await sbFetch(`items?id=eq.${t.item.id}`, {
        method: 'PATCH', prefer: 'return=minimal',
        body: { stock_qty: cur + t.kg, updated_at: new Date().toISOString() },
      });
      if (ti) ti.stock_qty = cur + t.kg;
    }
    const fi = ALL_ITEMS.find(x => x.id === selectedFrom.id);
    if (fi) fi.stock_qty = Math.max(0, fromStock - fromKg);

    const summary = results.map(t => `${t.item.name} +${t.kg}กก.`).join(', ');
    toast(`✅ ${selectedFrom.name} −${fromKg}กก. → ${summary}`, 'success');
    setTimeout(resetAll, 1800);
  } catch (err) {
    toast('❌ ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="ph ph-check-circle"></i> บันทึก';
  }
}

// ══════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════
function resetAll() {
  selectedFrom = null;
  selectedTos  = {};
  activeCat    = 'all';
  q1           = '';
  document.getElementById('search-1').value = '';

  // reset step 1 UI
  document.getElementById('bar-idle').style.display = 'flex';
  document.getElementById('bar-kg').style.display   = 'none';
  document.getElementById('from-kg').value = '';
  document.getElementById('btn-next-1').disabled = true;

  // reset cat buttons
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === 'all');
  });

  goStep(1);
  renderGrid1();
}

// ══════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeCat = btn.dataset.cat;
    renderGrid1();
  });
});

document.getElementById('search-1').addEventListener('input', e => {
  q1 = e.target.value.trim();
  renderGrid1();
});

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = ''; }, 2400);
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
(async () => {
  const _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) {
    window.location.replace('login.html');
    return;
  }
  window.AUTH = {
    token:  session.access_token,
    user:   session.user,
    logout: async () => { await _sb.auth.signOut(); window.location.replace('login.html'); }
  };
  loadItems();
})();
</script>
