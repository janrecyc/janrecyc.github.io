<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScrapPOS — คัดแยก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --ink:        #0A0A0F;
  --ink2:       #3A3A4A;
  --ink3:       #8A8A9A;
  --surface:    #F5F5FA;
  --white:      #FFFFFF;
  --primary:    #00B86B;
  --primary-d:  #008F52;
  --primary-l:  rgba(0,184,107,0.10);
  --green:      #00C853;
  --red:        #FF3B30;
  --amber:      #FF9F0A;
  --blue:       #1A6BFF;
  --card-sh:    0 2px 20px rgba(10,10,30,0.07), 0 0 0 0.5px rgba(10,10,30,0.06);
  --card-sh-active: 0 8px 32px rgba(0,184,107,0.18), 0 0 0 1.5px var(--primary);
  --r: 20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Prompt',sans-serif;
  background:var(--surface);
  color:var(--ink);
  height:100dvh;
  display:flex; flex-direction:column;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}

.status-bar{height:env(safe-area-inset-top,0px);background:var(--white);flex-shrink:0;}

header{
  background:var(--white);
  padding:14px 20px 12px;
  flex-shrink:0;
  border-bottom:1px solid rgba(10,10,30,0.06);
}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.app-logo{display:flex;align-items:center;gap:8px;}
.logo-mark{width:32px;height:32px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;}
.app-name{font-size:13px;font-weight:700;color:var(--ink3);letter-spacing:2px;text-transform:uppercase;}
.header-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:none;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:18px;cursor:pointer;transition:background .15s;}
.icon-btn:active{background:#e8e8f0;}
.page-title{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;line-height:1.1;}
.page-sub{font-size:12px;color:var(--ink3);font-weight:400;margin-left:2px;}

/* ── CONFIG BANNER ── */
.config-banner{
  background:#FFF3CD;border-bottom:2px solid #FF9F0A;
  padding:8px 20px;font-size:12px;font-weight:500;color:#664D03;
  display:none;align-items:center;gap:8px;flex-shrink:0;
}
.config-banner i{color:var(--amber);font-size:16px;}

/* ── MAIN BODY ── */
.app-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── SEARCH + CATS ── */
.search-area{padding:10px 20px 0;flex-shrink:0;}
.search-field{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1px solid rgba(10,10,30,0.08);
  border-radius:14px;padding:10px 14px;
  box-shadow:0 1px 6px rgba(10,10,30,0.05);
  transition:border-color .15s,box-shadow .15s;
}
.search-field:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,184,107,0.12);}
.search-field i{color:var(--ink3);font-size:17px;}
.search-field input{flex:1;border:none;outline:none;font-family:'Prompt',sans-serif;font-size:14px;color:var(--ink);background:transparent;}
.search-field input::placeholder{color:var(--ink3);}

.cat-bar{display:flex;gap:6px;padding:8px 20px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;padding:6px 14px;border-radius:100px;
  font-family:'Prompt',sans-serif;font-size:12px;font-weight:500;
  border:none;cursor:pointer;transition:all .16s;white-space:nowrap;
}
.cat-btn.on{background:var(--ink);color:white;box-shadow:0 2px 8px rgba(10,10,30,0.2);}
.cat-btn:not(.on){background:var(--white);color:var(--ink2);border:1px solid rgba(10,10,30,0.08);}
.cat-btn:not(.on):active{background:var(--surface);}

/* ── ITEM GRID ── */
.item-grid-wrap{flex:1;overflow-y:auto;padding:4px 20px 8px;scrollbar-width:none;}
.item-grid-wrap::-webkit-scrollbar{display:none;}
.item-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
@media(min-width:500px){.item-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.item-grid{grid-template-columns:repeat(4,1fr);}}

.item-card{
  background:var(--white);border-radius:var(--r);padding:16px 14px 14px;
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:var(--card-sh);
  transition:transform .13s,box-shadow .13s;
  border:1.5px solid transparent;
  display:flex;flex-direction:column;gap:8px;
  user-select:none;-webkit-user-select:none;
  min-height:140px;
}
.item-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.7) 0%,transparent 50%);pointer-events:none;}
.item-card:active{transform:scale(0.95);}
.item-card.empty-stock{opacity:0.42;pointer-events:none;}

.card-icon{font-size:32px;line-height:1;display:flex;}
.card-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;}
.card-stock-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:100px;
  background:rgba(0,200,83,0.1);color:var(--green);
  width:fit-content;
}
.card-stock-pill.low{background:rgba(255,159,10,0.12);color:var(--amber);}
.card-stock-pill.empty{background:rgba(255,59,48,0.1);color:var(--red);}

.grid-loading{
  grid-column:1/-1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  padding:60px 0;color:var(--ink3);
}
.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* phosphor icon pill */
.ph-icon-wrap{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:14px;flex-shrink:0;
}

/* ══════════════════════════════════════════
   MODAL 1 — วัตถุดิบ + numpad kg
══════════════════════════════════════════ */
.modal-backdrop{
  position:fixed;inset:0;z-index:800;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  transition:background .28s ease,backdrop-filter .28s ease;
  pointer-events:none;
}
.modal-backdrop.open{
  background:rgba(0,0,0,0.40);
  backdrop-filter:blur(6px);
  pointer-events:all;
}

.kg-modal{
  position:fixed;left:0;right:0;bottom:0;
  z-index:801;
  background:transparent;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);
  will-change:transform;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.kg-modal.open{transform:translateY(0);}

.kg-sheet{
  background:rgba(255,255,255,0.96);
  backdrop-filter:saturate(180%) blur(30px);
  -webkit-backdrop-filter:saturate(180%) blur(30px);
  border-radius:24px 24px 0 0;
  overflow:hidden;
  box-shadow:0 -4px 40px rgba(0,0,0,0.18);
}

.kg-handle{
  width:36px;height:4px;
  background:rgba(60,60,67,0.3);
  border-radius:100px;
  margin:10px auto 0;
}

.kg-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 8px;
}
.kg-item-info{display:flex;align-items:center;gap:10px;}
.kg-item-icon{font-size:28px;line-height:1;}
.kg-item-name{font-size:16px;font-weight:700;color:var(--ink);}
.kg-item-sub{font-size:12px;color:var(--ink3);margin-top:1px;}
.kg-close-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(60,60,67,0.12);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--ink2);transition:background .12s;
}
.kg-close-btn:active{background:rgba(60,60,67,0.22);}

.kg-display{
  margin:4px 20px 12px;
  background:var(--surface);
  border-radius:18px;
  padding:12px 18px;
  display:flex;align-items:flex-end;justify-content:space-between;
}
.kg-display-label{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.kg-display-val{
  font-size:44px;font-weight:800;color:var(--ink);
  line-height:1;letter-spacing:-2px;
  min-height:52px;display:flex;align-items:center;gap:4px;
}
.kg-display-val .unit{font-size:18px;font-weight:500;color:var(--ink3);letter-spacing:0;margin-bottom:4px;}
.kg-display-val .cursor{width:3px;height:40px;background:var(--primary);border-radius:2px;margin-left:2px;animation:blink .9s step-end infinite;}
@keyframes blink{50%{opacity:0;}}
.kg-subtotal-label{font-size:11px;color:var(--ink3);text-align:right;}
.kg-subtotal-val{font-size:18px;font-weight:800;color:var(--primary);text-align:right;margin-top:2px;}
.kg-stock-note{font-size:10px;color:var(--ink3);text-align:right;margin-top:2px;}

.kg-presets{
  display:flex;gap:6px;padding:0 20px 10px;overflow-x:auto;scrollbar-width:none;
}
.kg-presets::-webkit-scrollbar{display:none;}
.kg-preset-btn{
  flex-shrink:0;font-family:'Prompt',sans-serif;font-size:12px;font-weight:600;
  padding:6px 14px;border-radius:100px;
  border:1.5px solid rgba(0,184,107,0.2);
  background:rgba(0,184,107,0.06);color:var(--primary);cursor:pointer;
  transition:all .12s;
}
.kg-preset-btn:active{background:rgba(0,184,107,0.18);transform:scale(0.93);}

.kg-numpad{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:rgba(60,60,67,0.1);
  border-top:1px solid rgba(60,60,67,0.08);
}
.kg-key{
  background:rgba(255,255,255,0.95);border:none;padding:0;
  height:64px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-family:'Prompt',sans-serif;
  transition:background .08s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}
.kg-key:active{background:rgba(209,209,214,0.8);}
.kg-key.dark{background:rgba(174,174,178,0.35);}
.kg-key.dark:active{background:rgba(174,174,178,0.65);}
.kg-key-num{font-size:24px;font-weight:400;color:var(--ink);letter-spacing:-0.5px;}
.kg-key-sub{font-size:9px;color:var(--ink3);position:absolute;bottom:9px;letter-spacing:.5px;}
.kg-key-icon{font-size:22px;color:var(--ink);}
.kg-key.primary-key{background:var(--primary);}
.kg-key.primary-key:active{background:var(--primary-d);}
.kg-key.primary-key .kg-key-num,
.kg-key.primary-key .kg-key-icon{color:white;}

.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.4);
  transform:scale(0);animation:ripple-anim .4s linear;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(4);opacity:0;}}

.kg-confirm-row{padding:10px 20px;background:rgba(255,255,255,0.95);}
.kg-confirm-btn{
  width:100%;padding:15px;border-radius:16px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);
  color:white;border:none;
  font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,184,107,0.35);
  transition:opacity .15s,transform .1s;
}
.kg-confirm-btn:active{opacity:0.85;transform:scale(0.98);}
.kg-confirm-btn:disabled{opacity:0.35;pointer-events:none;box-shadow:none;}

/* ══════════════════════════════════════════
   MODAL 2 — เลือกผลลัพธ์ + กรอก kg แต่ละชนิด
══════════════════════════════════════════ */
.result-modal-backdrop{
  position:fixed;inset:0;z-index:900;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  transition:background .28s ease,backdrop-filter .28s ease;
  pointer-events:none;
}
.result-modal-backdrop.open{
  background:rgba(0,0,0,0.50);
  backdrop-filter:blur(8px);
  pointer-events:all;
}

.result-modal{
  position:fixed;left:0;right:0;bottom:0;
  z-index:901;
  background:transparent;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(0.32,0.72,0,1);
  will-change:transform;
  padding-bottom:env(safe-area-inset-bottom,0px);
  /* tall sheet — up to 90vh */
  max-height:90dvh;
  display:flex;flex-direction:column;
}
.result-modal.open{transform:translateY(0);}

.result-sheet{
  background:rgba(255,255,255,0.97);
  backdrop-filter:saturate(180%) blur(30px);
  -webkit-backdrop-filter:saturate(180%) blur(30px);
  border-radius:24px 24px 0 0;
  overflow:hidden;
  box-shadow:0 -4px 40px rgba(0,0,0,0.22);
  display:flex;flex-direction:column;
  max-height:90dvh;
}

.result-handle{width:36px;height:4px;background:rgba(60,60,67,0.3);border-radius:100px;margin:10px auto 0;flex-shrink:0;}

/* from-chip inside modal 2 */
.result-from-chip{
  display:flex;align-items:center;gap:10px;
  background:var(--primary-l);
  border:1px solid rgba(0,184,107,0.20);
  border-radius:14px;padding:10px 14px;
  margin:10px 20px 0;flex-shrink:0;
}
.rfc-icon{font-size:22px;line-height:1;display:flex;align-items:center;}
.rfc-name{font-size:13px;font-weight:700;color:var(--ink);flex:1;}
.rfc-badge{font-size:12px;font-weight:700;color:var(--primary);background:rgba(0,184,107,0.15);padding:3px 10px;border-radius:100px;}

/* tab switcher: เลือก / ใส่น้ำหนัก */
.result-tabs{
  display:flex;gap:0;margin:10px 20px 0;
  background:var(--surface);border-radius:12px;padding:3px;
  flex-shrink:0;
}
.result-tab{
  flex:1;padding:8px;border-radius:10px;
  font-family:'Prompt',sans-serif;font-size:13px;font-weight:600;
  border:none;cursor:pointer;
  background:transparent;color:var(--ink3);
  transition:all .18s;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.result-tab.on{background:var(--white);color:var(--ink);box-shadow:0 1px 6px rgba(10,10,30,0.08);}
.result-tab-badge{
  background:var(--primary);color:white;
  border-radius:100px;padding:1px 6px;font-size:10px;
}

/* tab panes */
.result-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.result-pane.active{display:flex;}

/* ── PANE A: เลือกสินค้า ── */
.result-grid-wrap{flex:1;overflow-y:auto;padding:8px 20px 8px;scrollbar-width:none;}
.result-grid-wrap::-webkit-scrollbar{display:none;}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:460px){.result-grid{grid-template-columns:repeat(3,1fr);}}

.cat-header{
  grid-column:1/-1;
  font-size:10px;font-weight:700;color:var(--ink3);
  letter-spacing:1.2px;text-transform:uppercase;
  padding:8px 2px 4px;
  display:flex;align-items:center;gap:6px;
}
.cat-header::after{content:'';flex:1;height:1px;background:rgba(10,10,30,0.05);}

.result-card{
  background:var(--white);border-radius:16px;
  padding:14px 12px 12px;
  cursor:pointer;border:1.5px solid transparent;
  box-shadow:var(--card-sh);
  display:flex;flex-direction:column;gap:6px;
  transition:transform .13s,box-shadow .13s,border-color .13s;
  position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.result-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.7) 0%,transparent 50%);pointer-events:none;}
.result-card:active{transform:scale(0.95);}
.result-card.selected{border-color:var(--primary);box-shadow:var(--card-sh-active);}

.result-card .rc-check{
  position:absolute;top:8px;right:8px;
  width:20px;height:20px;
  background:var(--primary);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:white;font-size:10px;
  opacity:0;transform:scale(0.6);
  transition:all .18s;
}
.result-card.selected .rc-check{opacity:1;transform:scale(1);}
.result-icon{font-size:28px;line-height:1;display:flex;}
.result-name{font-size:12px;font-weight:700;color:var(--ink);line-height:1.3;}
.result-price{font-size:12px;font-weight:700;color:var(--primary);}
.result-price-unit{font-size:10px;font-weight:400;color:var(--ink3);}

/* ── PANE B: ใส่น้ำหนัก ── */
.weight-pane-wrap{flex:1;overflow-y:auto;padding:8px 20px 8px;scrollbar-width:none;}
.weight-pane-wrap::-webkit-scrollbar{display:none;}

.wi-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:40px 0;color:var(--ink3);
}

.weight-item{
  background:var(--white);border-radius:16px;
  padding:12px 14px;
  margin-bottom:8px;
  box-shadow:var(--card-sh);
  display:flex;align-items:center;gap:12px;
}
.wi-icon{font-size:24px;flex-shrink:0;display:flex;align-items:center;}
.wi-info{flex:1;min-width:0;}
.wi-name{font-size:13px;font-weight:700;color:var(--ink);}
.wi-price{font-size:11px;color:var(--ink3);margin-top:2px;}
.wi-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
/* tap to open numpad for each result item */
.wi-kg-btn{
  display:flex;align-items:center;gap:4px;
  background:var(--surface);border:1.5px solid rgba(10,10,30,0.08);
  border-radius:10px;padding:6px 10px;cursor:pointer;
  font-family:'Prompt',sans-serif;font-size:14px;font-weight:800;color:var(--ink);
  transition:border-color .12s,background .12s;min-width:68px;justify-content:center;
}
.wi-kg-btn.has-val{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
.wi-kg-btn:active{background:#e0e0ea;}
.wi-kg-unit{font-size:11px;font-weight:400;color:var(--ink3);}
.wi-remove{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,59,48,0.08);border:none;
  color:var(--red);font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;
}
.wi-remove:active{background:rgba(255,59,48,0.2);}

.total-card{
  background:var(--primary-l);
  border:1px solid rgba(0,184,107,0.2);
  border-radius:16px;padding:14px 16px;
  margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.total-label{font-size:12px;font-weight:600;color:var(--primary);}
.total-val{font-size:20px;font-weight:800;color:var(--primary);}

/* footer of modal 2 */
.result-footer{
  flex-shrink:0;
  padding:10px 20px;
  border-top:1px solid rgba(10,10,30,0.06);
  background:rgba(255,255,255,0.95);
}
.result-footer-row{display:flex;gap:8px;}
.btn-back{
  flex:1;padding:13px;border-radius:14px;
  background:var(--surface);border:1px solid rgba(10,10,30,0.08);
  font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;
  color:var(--ink2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .12s;
}
.btn-back:active{background:#e0e0ea;}
.btn-save{
  flex:2;padding:13px;border-radius:14px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);
  border:none;color:white;
  font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;
  box-shadow:0 4px 16px rgba(0,184,107,0.30);
  transition:opacity .15s,transform .1s;
}
.btn-save:disabled{opacity:.35;pointer-events:none;box-shadow:none;}
.btn-save:active{opacity:.85;transform:scale(0.98);}

/* ══════════════════════════════════════════

async function sbFetch(path, opts = {}) {
  let token = SUPABASE_ANON;
  if (_sb) {
    const { data: { session } } = await _sb.auth.getSession();
    if (session) token = session.access_token;
  }
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers,
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.message || `HTTP ${res.status}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('on', b === btn));
      activeCat = btn.dataset.cat;
      renderGrid1();
    });
  });
}

  await loadCats();
  renderCatBar();

  if (!SUPABASE_READY) {
    ALL_ITEMS = DEMO_ITEMS;
    document.getElementById('config-banner').style.display = 'flex';
    renderGrid1();
    return;
  }
  document.getElementById('config-banner').style.display = 'none';
  try {
    ALL_ITEMS = await sbFetch('items?select=id,name,icon,buy_price,sell_price,stock_qty,cat&order=cat,name') || [];
    renderGrid1();
  } catch (err) {
    ALL_ITEMS = DEMO_ITEMS;
    toast('โหลดไม่สำเร็จ ใช้ข้อมูล Demo', 'error');
    renderGrid1();
  }
}

// ══════════════════════════════════════════
//  GRID 1: วัตถุดิบ
// ══════════════════════════════════════════
function renderGrid1() {
  const grid = document.getElementById('grid-1');
  let list = ALL_ITEMS;
  if (activeCat !== 'all') list = list.filter(x => x.cat === activeCat);
  if (q1) list = list.filter(x => x.name.includes(q1));

  if (!list.length) {
    grid.innerHTML = `<div class="grid-loading"><i class="ph ph-magnifying-glass" style="font-size:28px;"></i><span style="font-size:13px;">ไม่พบสินค้า</span></div>`;
    return;
  }

  grid.innerHTML = list.map(item => {
    const stock = Number(item.stock_qty || 0);
    const empty = stock <= 0;
    const cls   = empty ? 'empty' : stock < 100 ? 'low' : '';
    return `
    <div class="item-card ${empty ? 'empty-stock' : ''}"
      onclick="${empty ? `toast('สต๊อกหมด','error')` : `openM1(${item.id})`}">
      <div class="card-icon">${renderIcon(item.icon, item.cat, 26)}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-stock-pill ${cls}">
        <i class="ph ph-stack-simple" style="font-size:9px;"></i>
        ${empty ? 'หมดสต๊อก' : stock.toLocaleString('th-TH') + ' กก.'}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search-1').addEventListener('input', e => {
  q1 = e.target.value.trim();
  renderGrid1();
});

// ══════════════════════════════════════════
//  MODAL 1: numpad วัตถุดิบ
// ══════════════════════════════════════════
let m1Buffer = '';
let m1ItemId = null;

function openM1(id) {
  const item = ALL_ITEMS.find(x => x.id === id);
  if (!item) return;
  m1ItemId = id;
  m1Buffer = '';

  const stock = Number(item.stock_qty || 0);
  document.getElementById('m1-icon').innerHTML = renderIcon(item.icon, item.cat, 26);
  document.getElementById('m1-name').textContent = item.name;
  document.getElementById('m1-stock').textContent = `สต๊อก ${stock.toLocaleString('th-TH')} กก.`;
  document.getElementById('m1-stock-remain').textContent = stock.toLocaleString('th-TH') + ' กก.';
  document.getElementById('m1-stock-after').textContent = '';

  updateM1Display();

  document.getElementById('m1-backdrop').classList.add('open');
  document.getElementById('m1-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeM1() {
  document.getElementById('m1-backdrop').classList.remove('open');
  document.getElementById('m1-modal').classList.remove('open');
  document.body.style.overflow = '';
  m1ItemId = null;
  m1Buffer = '';
}

function updateM1Display() {
  const val = parseFloat(m1Buffer) || 0;
  document.getElementById('m1-display-num').textContent = m1Buffer || '0';

  const item  = m1ItemId ? ALL_ITEMS.find(x => x.id === m1ItemId) : null;
  const stock = item ? Number(item.stock_qty || 0) : 0;
  const after = stock - val;

  document.getElementById('m1-stock-remain').textContent = stock.toLocaleString('th-TH') + ' กก.';
  if (val > 0) {
    document.getElementById('m1-stock-after').textContent = `หลังคัดแยก: ${Math.max(0,after).toLocaleString('th-TH')} กก.`;
  } else {
    document.getElementById('m1-stock-after').textContent = '';
  }

  const valid = val > 0 && val <= stock;
  const btn   = document.getElementById('m1-confirm-btn');
  const lbl   = document.getElementById('m1-confirm-label');
  btn.disabled = !valid;
  if (val > stock && val > 0) {
    lbl.textContent = `❌ เกินสต๊อก (${stock} กก.)`;
  } else if (valid) {
    lbl.textContent = `เลือกผลลัพธ์ → ${val} กก.`;
  } else {
    lbl.textContent = 'เลือกผลลัพธ์';
  }
}

function m1Num(n, e) {
  if (m1Buffer.length >= 7) return;
  if (m1Buffer === '0') m1Buffer = n; else m1Buffer += n;
  rippleKey(e); updateM1Display();
}
function m1Dot(e) {
  if (m1Buffer.includes('.')) return;
  if (!m1Buffer) m1Buffer = '0';
  m1Buffer += '.';
  rippleKey(e); updateM1Display();
}
function m1Back(e) {
  m1Buffer = m1Buffer.slice(0,-1);
  rippleKey(e); updateM1Display();
}
function m1Preset(val) {
  m1Buffer = String(val);
  updateM1Display();
  pulse('m1-display-num');
}

function confirmM1() {
  const val = parseFloat(m1Buffer);
  if (!val || val <= 0 || !m1ItemId) return;
  const item = ALL_ITEMS.find(x => x.id === m1ItemId);
  if (!item) return;
  if (val > Number(item.stock_qty || 0)) {
    toast(`❌ เกินสต๊อก (${item.stock_qty} กก.)`, 'error');
    return;
  }

  selectedFrom = item;
  fromKg       = val;

  // reset result selections
  selectedTos = {};

  // open modal 2
  closeM1();
  setTimeout(() => openM2(), 80);
}

// swipe down M1
let m1TouchY = 0;
document.getElementById('m1-modal').addEventListener('touchstart', e => { m1TouchY = e.touches[0].clientY; }, {passive:true});
document.getElementById('m1-modal').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - m1TouchY > 60) closeM1();
}, {passive:true});

// ══════════════════════════════════════════
//  MODAL 2: เลือกผลลัพธ์ + ใส่น้ำหนัก
// ══════════════════════════════════════════
let activeTab = 'select'; // 'select' | 'weight'

function openM2() {
  // fill header
  document.getElementById('m2-from-icon').innerHTML = renderIcon(selectedFrom.icon, selectedFrom.cat, 20);
  document.getElementById('m2-from-name').textContent = selectedFrom.name;
  document.getElementById('m2-from-kg').textContent   = fromKg + ' กก.';

  activeTab = 'select';
  switchTab('select');
  renderGrid2();
  updateM2Footer();

  document.getElementById('m2-backdrop').classList.add('open');
  document.getElementById('m2-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeM2() {
  // close sub-modal if open
  closeM3();
  document.getElementById('m2-backdrop').classList.remove('open');
  document.getElementById('m2-modal').classList.remove('open');
  document.body.style.overflow = '';
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-select').classList.toggle('on', tab === 'select');
  document.getElementById('tab-weight').classList.toggle('on', tab === 'weight');
  document.getElementById('pane-select').classList.toggle('active', tab === 'select');
  document.getElementById('pane-weight').classList.toggle('active', tab === 'weight');
  if (tab === 'weight') renderWeightPane();
}

function renderGrid2() {
  const grid = document.getElementById('grid-2');
  const list = ALL_ITEMS.filter(x => x.id !== selectedFrom.id);

  if (!list.length) {
    grid.innerHTML = `<div class="grid-loading" style="grid-column:1/-1;"><i class="ph ph-package" style="font-size:28px;"></i><span style="font-size:13px;">ไม่มีสินค้าอื่น</span></div>`;
    return;
  }

  const cats = [...new Set(list.map(x => x.cat))];
  let html = '';
  cats.forEach(cat => {
    const items = list.filter(x => x.cat === cat);
    html += `<div class="cat-header">${catIcon(cat)} ${catLabel(cat)}</div>`;
    items.forEach(item => {
      const sel = !!selectedTos[item.id];
      html += `
      <div class="result-card ${sel ? 'selected' : ''}" id="rc-${item.id}" onclick="toggleTo(${item.id})">
        <div class="rc-check"><i class="ph ph-check-bold"></i></div>
        <div class="result-icon">${renderIcon(item.icon, item.cat, 22)}</div>
        <div class="result-name">${item.name}</div>
        <div class="result-price">฿${Number(item.sell_price).toFixed(2)}<span class="result-price-unit">/กก.</span></div>
      </div>`;
    });
  });
  grid.innerHTML = html;
  updateTabBadges();
}

function toggleTo(id) {
  id = Number(id);
  const item = ALL_ITEMS.find(x => x.id === id);
  if (!item) return;

  if (selectedTos[id]) {
    delete selectedTos[id];
  } else {
    selectedTos[id] = { item, kg: 0 };
  }

  const card = document.getElementById(`rc-${id}`);
  if (card) card.classList.toggle('selected', !!selectedTos[id]);

  updateTabBadges();
  updateM2Footer();
  // if weight pane is active, re-render
  if (activeTab === 'weight') renderWeightPane();
}

function updateTabBadges() {
  const count = Object.keys(selectedTos).length;
  const selBadge = document.getElementById('tab-sel-count');
  const wtBadge  = document.getElementById('tab-wt-count');
  if (count > 0) {
    selBadge.textContent = count; selBadge.style.display = '';
    wtBadge.textContent  = count; wtBadge.style.display  = '';
  } else {
    selBadge.style.display = 'none';
    wtBadge.style.display  = 'none';
  }
}

function renderWeightPane() {
  const wrap  = document.getElementById('weight-pane-wrap');
  const items = Object.values(selectedTos);

  if (!items.length) {
    wrap.innerHTML = `<div class="wi-empty"><i class="ph ph-squares-four" style="font-size:32px;"></i><span style="font-size:13px;">เลือกสินค้าก่อนที่แท็บ "เลือกสินค้า"</span></div>`;
    return;
  }

  let totalVal = 0;
  items.forEach(t => { totalVal += (t.kg||0) * Number(t.item.sell_price); });

  const rows = items.map(t => {
    const hasVal = t.kg > 0;
    return `
    <div class="weight-item" id="wi-${t.item.id}">
      <div class="wi-icon">${renderIcon(t.item.icon, t.item.cat, 22)}</div>
      <div class="wi-info">
        <div class="wi-name">${t.item.name}</div>
        <div class="wi-price">฿${Number(t.item.sell_price).toFixed(2)} / กก.</div>
      </div>
      <div class="wi-right">
        <div class="wi-kg-btn ${hasVal?'has-val':''}" onclick="openM3(${t.item.id})">
          <span>${hasVal ? (t.kg%1===0?t.kg:t.kg.toFixed(1)) : '0'}</span>
          <span class="wi-kg-unit">กก.</span>
        </div>
        <button class="wi-remove" onclick="removeTo(${t.item.id})"><i class="ph ph-x-bold"></i></button>
      </div>
    </div>`;
  }).join('');

  const totalHtml = `
  <div class="total-card">
    <span class="total-label">มูลค่ารวมโดยประมาณ</span>
    <span class="total-val">฿${totalVal.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
  </div>`;

  wrap.innerHTML = rows + totalHtml;
  updateM2Footer();
}

function removeTo(id) {
  id = Number(id);
  delete selectedTos[id];
  const card = document.getElementById(`rc-${id}`);
  if (card) card.classList.remove('selected');
  updateTabBadges();
  renderWeightPane();
  updateM2Footer();
  if (!Object.keys(selectedTos).length) {
    toast('กรุณาเลือกผลลัพธ์อย่างน้อย 1 ชนิด', 'error');
  }
}

function updateM2Footer() {
  const hasKg = Object.values(selectedTos).some(t => t.kg > 0);
  document.getElementById('btn-save').disabled = !hasKg;
}

// swipe down M2
let m2TouchY = 0;
document.getElementById('m2-modal').addEventListener('touchstart', e => { m2TouchY = e.touches[0].clientY; }, {passive:true});
document.getElementById('m2-modal').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - m2TouchY > 80) closeM2();
}, {passive:true});

// ══════════════════════════════════════════
//  MODAL 3: numpad ผลลัพธ์แต่ละชนิด
// ══════════════════════════════════════════
let m3Buffer  = '';
let m3ItemId  = null;

function openM3(id) {
  id = Number(id);
  const rec = selectedTos[id];
  if (!rec) return;
  m3ItemId = id;
  m3Buffer = rec.kg > 0 ? String(rec.kg) : '';

  document.getElementById('m3-icon').innerHTML  = renderIcon(rec.item.icon, rec.item.cat, 26);
  document.getElementById('m3-name').textContent  = rec.item.name;
  document.getElementById('m3-price').textContent = `฿${Number(rec.item.sell_price).toFixed(2)} / กก.`;

  updateM3Display();

  document.getElementById('m3-backdrop').classList.add('open');
  document.getElementById('m3-modal').classList.add('open');
}

function closeM3() {
  document.getElementById('m3-backdrop').classList.remove('open');
  document.getElementById('m3-modal').classList.remove('open');
  m3ItemId = null;
  m3Buffer = '';
}

function updateM3Display() {
  const val  = parseFloat(m3Buffer) || 0;
  document.getElementById('m3-display-num').textContent = m3Buffer || '0';

  const rec   = m3ItemId ? selectedTos[m3ItemId] : null;
  const price = rec ? Number(rec.item.sell_price) : 0;
  const sub   = val * price;
  document.getElementById('m3-subtotal').textContent = sub > 0 ? `฿${sub.toFixed(2)}` : '฿0';

  const btn = document.getElementById('m3-confirm-btn');
  const lbl = document.getElementById('m3-confirm-label');
  if (val > 0) {
    btn.disabled = false;
    lbl.textContent = `ยืนยัน ${val} กก. = ฿${sub.toFixed(2)}`;
  } else {
    btn.disabled = false; // allow 0 to clear
    lbl.textContent = 'ยืนยัน (0 = ล้างค่า)';
  }
}

function m3Num(n, e) {
  if (m3Buffer.length >= 7) return;
  if (m3Buffer === '0') m3Buffer = n; else m3Buffer += n;
  rippleKey(e); updateM3Display();
}
function m3Dot(e) {
  if (m3Buffer.includes('.')) return;
  if (!m3Buffer) m3Buffer = '0';
  m3Buffer += '.';
  rippleKey(e); updateM3Display();
}
function m3Back(e) {
  m3Buffer = m3Buffer.slice(0,-1);
  rippleKey(e); updateM3Display();
}
function m3Preset(val) {
  m3Buffer = String(val);
  updateM3Display();
  pulse('m3-display-num');
}

function confirmM3() {
  if (!m3ItemId) return;
  const val = parseFloat(m3Buffer) || 0;
  if (selectedTos[m3ItemId]) {
    selectedTos[m3ItemId].kg = val;
  }
  closeM3();
  renderWeightPane();
  updateM2Footer();
}

// swipe down M3
let m3TouchY = 0;
document.getElementById('m3-modal').addEventListener('touchstart', e => { m3TouchY = e.touches[0].clientY; }, {passive:true});
document.getElementById('m3-modal').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - m3TouchY > 60) closeM3();
}, {passive:true});

// ══════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════
async function saveSort() {
  const results = Object.values(selectedTos).filter(t => t.kg > 0);
  const fromStock = Number(selectedFrom.stock_qty || 0);

  if (fromKg < 0.1) { toast('กรุณากรอกน้ำหนักวัตถุดิบอย่างน้อย 0.1 กก.', 'error'); return; }
  if (fromKg > fromStock) { toast(`❌ สต๊อก${selectedFrom.name}มีแค่ ${fromStock.toLocaleString('th-TH')} กก.`, 'error'); return; }
  if (!results.length) { toast('กรุณาใส่น้ำหนักผลลัพธ์อย่างน้อย 1 ชนิด', 'error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="ph ph-spinner-gap spin"></i> กำลังบันทึก...';

  if (!SUPABASE_READY) {
    await new Promise(r => setTimeout(r, 600));
    const fi = ALL_ITEMS.find(x => x.id === selectedFrom.id);
    if (fi) fi.stock_qty = Math.max(0, Number(fi.stock_qty) - fromKg);
    results.forEach(t => {
      const ti = ALL_ITEMS.find(x => x.id === t.item.id);
      if (ti) ti.stock_qty = Number(ti.stock_qty || 0) + t.kg;
    });
    const summary = results.map(t => `${t.item.name} +${t.kg}กก.`).join(', ');
    toast(`✅ ${selectedFrom.name} −${fromKg}กก. → ${summary}`, 'success');
    closeM2();
    setTimeout(resetAll, 1200);
    return;
  }

  try {
    const result = await sbFetch('rpc/record_sort', {
      method: 'POST',
      body: {
        p_from_item_id:   selectedFrom.id,
        p_from_item_name: selectedFrom.name,
        p_from_kg:        fromKg,
        p_results: results.map(t => ({
          item_id:    t.item.id,
          item_name:  t.item.name,
          kg:         t.kg,
          sell_price: Number(t.item.sell_price),
        })),
      },
    });

    if (!result || !result.success) throw new Error('RPC ไม่สำเร็จ');

    const fi = ALL_ITEMS.find(x => x.id === selectedFrom.id);
    if (fi) fi.stock_qty = Math.max(0, fromStock - fromKg);
    results.forEach(t => {
      const ti = ALL_ITEMS.find(x => x.id === t.item.id);
      if (ti) ti.stock_qty = Number(ti.stock_qty || 0) + t.kg;
    });

    const summary = results.map(t => `${t.item.name} +${t.kg}กก.`).join(', ');
    toast(`✅ ${selectedFrom.name} −${fromKg}กก. → ${summary}`, 'success');
    closeM2();
    setTimeout(resetAll, 1200);

  } catch (err) {
    toast('❌ ' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="ph ph-check-circle"></i> บันทึก';
  }
}

// ══════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════
function resetAll() {
  selectedFrom = null;
  fromKg       = 0;
  selectedTos  = {};
  activeCat    = 'all';
  q1           = '';
  document.getElementById('search-1').value = '';
  renderCatBar();
  renderGrid1();
  loadItems();
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function rippleKey(e) {
  if (!e || !e.currentTarget) return;
  const btn = e.currentTarget;
  const r   = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(btn.offsetWidth, btn.offsetHeight);
  r.style.cssText = `width:${size}px;height:${size}px;left:${size/2}px;top:${size/2}px;margin:-${size/2}px;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);
}

function pulse(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition = 'transform .12s';
  el.style.transform  = 'scale(1.08)';
  setTimeout(() => { el.style.transform = 'scale(1)'; }, 120);
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  const cls = ['toast-show'];
  if (type === 'success') cls.push('toast-success');
  if (type === 'error')   cls.push('toast-error');
  el.className = cls.join(' ');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { el.className = ''; }, 2400);
}

  }
  window.AUTH = {
    user:   session.user,
    logout: async () => { await _sb.auth.signOut(); window.location.replace('login.html'); }
  };
  loadItems();
})();
