<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ScrapPOS — ทดสอบการเชื่อมต่อ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root {
  --ink:     #0A0A0F;
  --ink2:    #3A3A4A;
  --ink3:    #8A8A9A;
  --surface: #F5F5FA;
  --white:   #FFFFFF;
  --green:   #00C853;
  --red:     #FF3B30;
  --amber:   #FF9F0A;
  --blue:    #1A6BFF;
  --purple:  #7C3AED;
  --r: 18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:'Prompt',sans-serif;
  background:var(--surface);
  color:var(--ink);
  min-height:100dvh;
  display:flex; flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
.status-bar{height:env(safe-area-inset-top,0px);background:var(--white);flex-shrink:0;}

header {
  background:var(--white);
  padding:14px 20px 14px;
  border-bottom:1px solid rgba(10,10,30,0.06);
  flex-shrink:0;
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.logo-mark{width:32px;height:32px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;}
.app-name{font-size:13px;font-weight:700;color:var(--ink3);letter-spacing:2px;text-transform:uppercase;}
.page-title{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;}
.page-sub{font-size:12px;color:var(--ink3);font-weight:400;}

.body{flex:1;padding:16px 16px calc(env(safe-area-inset-bottom,0px)+24px);max-width:560px;margin:0 auto;width:100%;}

/* CONFIG CARD */
.config-card{background:var(--white);border-radius:var(--r);padding:20px;box-shadow:0 2px 20px rgba(10,10,30,0.07),0 0 0 0.5px rgba(10,10,30,0.06);margin-bottom:14px;}
.card-title{font-size:13px;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.card-title i{font-size:18px;color:var(--purple);}

.field-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;display:block;}
.field-wrap{position:relative;margin-bottom:10px;}
.field-input{
  width:100%;padding:11px 40px 11px 14px;border-radius:13px;
  background:var(--surface);border:1.5px solid rgba(10,10,30,0.08);
  font-family:'Prompt',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.field-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,0.12);background:var(--white);}
.field-input::placeholder{color:var(--ink3);}
.field-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--ink3);cursor:pointer;transition:color .15s;}
.field-icon:hover{color:var(--ink);}

.hint{font-size:11px;color:var(--ink3);margin-top:2px;display:flex;align-items:center;gap:4px;}
.hint a{color:var(--blue);text-decoration:none;}
.hint a:hover{text-decoration:underline;}

/* TEST BUTTON */
.test-btn{
  width:100%;padding:15px;border-radius:16px;
  background:var(--purple);color:white;border:none;
  font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;transition:background .15s,opacity .15s;margin-bottom:14px;
}
.test-btn:hover{background:#6D28D9;}
.test-btn:active{background:#5B21B6;}
.test-btn:disabled{opacity:0.5;pointer-events:none;}

/* RESULTS */
.results-card{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:0 2px 20px rgba(10,10,30,0.07),0 0 0 0.5px rgba(10,10,30,0.06);margin-bottom:14px;display:none;}
.results-card.visible{display:block;}

.result-header{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(10,10,30,0.06);}
.result-header-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.result-header-icon.pass{background:rgba(0,200,83,0.12);color:var(--green);}
.result-header-icon.fail{background:rgba(255,59,48,0.12);color:var(--red);}
.result-header-icon.running{background:rgba(26,107,255,0.12);color:var(--blue);}
.result-header-text{}
.result-header-title{font-size:14px;font-weight:700;}
.result-header-sub{font-size:11px;color:var(--ink3);margin-top:1px;}

.check-list{padding:8px 0;}
.check-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 18px;border-bottom:1px solid rgba(10,10,30,0.04);
  transition:background .15s;
}
.check-item:last-child{border-bottom:none;}
.check-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px;}
.check-icon.pass{background:var(--green);color:white;}
.check-icon.fail{background:var(--red);color:white;}
.check-icon.warn{background:var(--amber);color:white;}
.check-icon.idle{background:rgba(10,10,30,0.06);color:var(--ink3);}
.check-icon.loading{background:rgba(26,107,255,0.12);color:var(--blue);}

.check-body{flex:1;min-width:0;}
.check-name{font-size:13px;font-weight:600;color:var(--ink);}
.check-desc{font-size:12px;color:var(--ink3);margin-top:2px;line-height:1.5;}
.check-code{
  margin-top:6px;padding:8px 12px;border-radius:10px;
  background:var(--surface);font-family:monospace;font-size:11px;
  color:var(--ink2);word-break:break-all;line-height:1.5;
  border:1px solid rgba(10,10,30,0.06);
}
.check-time{font-size:10px;color:var(--ink3);margin-top:4px;display:flex;align-items:center;gap:3px;}

/* SPEED BAR */
.speed-row{display:flex;align-items:center;gap:8px;margin-top:5px;}
.speed-bar-wrap{flex:1;height:5px;background:rgba(10,10,30,0.06);border-radius:100px;overflow:hidden;}
.speed-bar{height:100%;border-radius:100px;transition:width .6s ease;}
.speed-label{font-size:10px;font-weight:600;flex-shrink:0;}

/* COPY SNIPPET */
.snippet-card{background:var(--ink);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;}
.snippet-title{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.copy-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);font-family:'Prompt',sans-serif;font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.copy-btn:active{background:rgba(255,255,255,0.2);}
.snippet-code{font-family:monospace;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.8;white-space:pre-wrap;word-break:break-all;}
.tok-key{color:#FF9A60;}
.tok-val{color:#6EA8FF;}
.tok-str{color:#A8FF78;}
.tok-cmt{color:rgba(255,255,255,0.3);}

/* LINKS */
.link-row{display:flex;gap:8px;flex-wrap:wrap;}
.link-card{
  flex:1;min-width:140px;
  background:var(--white);border-radius:var(--r);padding:14px 16px;
  box-shadow:0 2px 20px rgba(10,10,30,0.07),0 0 0 0.5px rgba(10,10,30,0.06);
  text-decoration:none;color:var(--ink);display:flex;align-items:center;gap:10px;
  transition:transform .13s,box-shadow .13s;
}
.link-card:active{transform:scale(0.97);}
.link-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.link-card-text{}
.link-card-name{font-size:13px;font-weight:700;}
.link-card-sub{font-size:11px;color:var(--ink3);margin-top:1px;}

.spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .3s ease both;}
</style>
</head>
<body>

<div class="status-bar"></div>

<header>
  <div class="header-top">
    <div class="logo-mark"><i class="ph ph-recycle"></i></div>
    <span class="app-name">ScrapPOS</span>
  </div>
  <div class="page-title">ทดสอบการเชื่อมต่อ</div>
  <div style="font-size:12px;color:var(--ink3);margin-top:2px;">Connection Test — Supabase</div>
</header>

<div class="body">

  <!-- CONFIG INPUT -->
  <div class="config-card">
    <div class="card-title"><i class="ph ph-plug"></i>ข้อมูลการเชื่อมต่อ Supabase</div>

    <label class="field-label">Project URL</label>
    <div class="field-wrap">
      <input class="field-input" type="text" id="inp-url"
        placeholder="https://xxxxxxxxxxxx.supabase.co"
        value="">
      <i class="ph ph-x-circle field-icon" onclick="clearField('inp-url')" title="ล้าง"></i>
    </div>
    <div class="hint"><i class="ph ph-info"></i>พบได้ที่ Supabase Dashboard → <a href="https://supabase.com/dashboard" target="_blank">Settings → API</a></div>

    <div style="height:12px;"></div>

    <label class="field-label">Anon / Public Key</label>
    <div class="field-wrap">
      <input class="field-input" type="password" id="inp-key"
        placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
      <i class="ph ph-eye field-icon" id="eye-icon" onclick="toggleKey()" title="แสดง/ซ่อน"></i>
    </div>
    <div class="hint"><i class="ph ph-info"></i>ใช้ <b>anon</b> key เท่านั้น ห้ามใช้ service_role key</div>
  </div>

  <!-- TEST BUTTON -->
  <button class="test-btn" id="test-btn" onclick="runTest()">
    <i class="ph ph-plugs-connected"></i>
    ทดสอบการเชื่อมต่อ
  </button>

  <!-- RESULTS -->
  <div class="results-card" id="results-card">
    <div class="result-header">
      <div class="result-header-icon idle" id="res-icon">
        <i class="ph ph-circle-dashed"></i>
      </div>
      <div class="result-header-text">
        <div class="result-header-title" id="res-title">กำลังทดสอบ...</div>
        <div class="result-header-sub" id="res-sub">โปรดรอสักครู่</div>
      </div>
    </div>
    <div class="check-list" id="check-list"></div>
  </div>

  <!-- CODE SNIPPET (แสดงหลัง success) -->
  <div class="snippet-card fade-in" id="snippet-card" style="display:none;">
    <div class="snippet-title">
      <span>คัดลอกใส่ไฟล์ .html</span>
      <button class="copy-btn" onclick="copySnippet()"><i class="ph ph-copy"></i> คัดลอก</button>
    </div>
    <div class="snippet-code" id="snippet-code"></div>
  </div>

  <!-- QUICK LINKS -->
  <div class="link-row">
    <a href="buy.html" class="link-card">
      <div class="link-card-icon" style="background:rgba(26,107,255,0.1);color:var(--blue);"><i class="ph ph-download-simple"></i></div>
      <div class="link-card-text">
        <div class="link-card-name">รับซื้อ</div>
        <div class="link-card-sub">buy.html</div>
      </div>
    </a>
    <a href="items.html" class="link-card">
      <div class="link-card-icon" style="background:rgba(124,58,237,0.1);color:var(--purple);"><i class="ph ph-pencil-simple"></i></div>
      <div class="link-card-text">
        <div class="link-card-name">สินค้า</div>
        <div class="link-card-sub">items.html</div>
      </div>
    </a>
    <a href="dashboard.html" class="link-card">
      <div class="link-card-icon" style="background:rgba(0,200,83,0.1);color:var(--green);"><i class="ph ph-package"></i></div>
      <div class="link-card-text">
        <div class="link-card-name">Dashboard</div>
        <div class="link-card-sub">dashboard.html</div>
      </div>
    </a>
  </div>

</div><!-- /body -->

<script>
// ── CHECKS DEFINITION ──────────────────────────────────
const CHECKS = [
  { id:'url',    name:'รูปแบบ URL',         desc:'ตรวจสอบว่า URL ถูกต้อง' },
  { id:'key',    name:'รูปแบบ API Key',     desc:'ตรวจสอบว่า Key มีรูปแบบ JWT ถูกต้อง' },
  { id:'ping',   name:'เชื่อมต่อเซิร์ฟเวอร์', desc:'ทดสอบ HTTPS ไปยัง Supabase' },
  { id:'auth',   name:'ยืนยัน API Key',     desc:'ตรวจสอบสิทธิ์การเข้าถึง' },
  { id:'items',  name:'ตาราง items',        desc:'ดึงข้อมูลจากตาราง items' },
  { id:'rls',    name:'Row Level Security', desc:'ตรวจสอบสิทธิ์ RLS' },
];

let results = {};

// ── UI HELPERS ─────────────────────────────────────────
function setCheck(id, state, desc, extra) {
  results[id] = state;
  const iconMap = {
    pass:    '<i class="ph ph-check-bold"></i>',
    fail:    '<i class="ph ph-x-bold"></i>',
    warn:    '<i class="ph ph-warning-bold"></i>',
    loading: '<i class="ph ph-spinner-gap spin"></i>',
    idle:    '<i class="ph ph-minus"></i>',
  };
  const el = document.getElementById('chk-' + id);
  if (!el) return;
  el.querySelector('.check-icon').className = `check-icon ${state}`;
  el.querySelector('.check-icon').innerHTML = iconMap[state] || '';
  if (desc) el.querySelector('.check-desc').textContent = desc;
  if (extra) {
    let extraEl = el.querySelector('.check-extra');
    if (!extraEl) {
      extraEl = document.createElement('div');
      extraEl.className = 'check-extra';
      el.querySelector('.check-body').appendChild(extraEl);
    }
    extraEl.innerHTML = extra;
  }
}

function buildChecks() {
  document.getElementById('check-list').innerHTML = CHECKS.map(c => `
    <div class="check-item" id="chk-${c.id}">
      <div class="check-icon idle"><i class="ph ph-minus"></i></div>
      <div class="check-body">
        <div class="check-name">${c.name}</div>
        <div class="check-desc">${c.desc}</div>
      </div>
    </div>
  `).join('');
}

function setHeader(state, title, sub) {
  const iconEl = document.getElementById('res-icon');
  const iconMap = { pass:'ph-check-circle', fail:'ph-x-circle', running:'ph-spinner-gap', warn:'ph-warning-circle' };
  const cls = state === 'running' ? 'running' : state === 'pass' ? 'pass' : state === 'warn' ? 'pass' : 'fail';
  iconEl.className = `result-header-icon ${cls}`;
  iconEl.innerHTML = `<i class="ph ${iconMap[state]} ${state==='running'?'spin':''}"></i>`;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent   = sub;
}

// ── FIELD HELPERS ──────────────────────────────────────
function clearField(id) { document.getElementById(id).value = ''; document.getElementById(id).focus(); }

function toggleKey() {
  const inp  = document.getElementById('inp-key');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'ph ph-eye-slash field-icon';
  } else {
    inp.type = 'password';
    icon.className = 'ph ph-eye field-icon';
  }
}

// ── SPEED BAR ─────────────────────────────────────────
function speedBar(ms) {
  const max = 2000;
  const pct = Math.min(100, (ms / max) * 100);
  const color = ms < 300 ? 'var(--green)' : ms < 800 ? 'var(--amber)' : 'var(--red)';
  const label = ms < 300 ? '⚡ เร็วมาก' : ms < 800 ? '🟡 ปานกลาง' : '🔴 ช้า';
  return `
    <div class="speed-row">
      <div class="speed-bar-wrap">
        <div class="speed-bar" style="width:${pct}%;background:${color};"></div>
      </div>
      <span class="speed-label" style="color:${color};">${ms}ms ${label}</span>
    </div>`;
}

// ── MAIN TEST ──────────────────────────────────────────
async function runTest() {
  const url = document.getElementById('inp-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('inp-key').value.trim();

  const btn = document.getElementById('test-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ph ph-spinner-gap spin"></i> กำลังทดสอบ...';

  document.getElementById('results-card').className = 'results-card visible';
  document.getElementById('snippet-card').style.display = 'none';
  buildChecks();
  setHeader('running', 'กำลังทดสอบ...', 'โปรดรอสักครู่');
  await delay(100);

  // ── CHECK 1: URL format ──
  setCheck('url', 'loading', 'กำลังตรวจสอบ...');
  await delay(250);
  if (!url) {
    setCheck('url', 'fail', '❌ กรุณากรอก Project URL');
    return done(false, btn);
  }
  const urlOk = /^https:\/\/[a-z0-9]+\.supabase\.co$/.test(url);
  if (!urlOk) {
    setCheck('url', 'fail', '❌ รูปแบบไม่ถูกต้อง ต้องเป็น https://xxxxxxxx.supabase.co',
      `<div class="check-code">คุณกรอก: ${url}</div>`);
    return done(false, btn);
  }
  setCheck('url', 'pass', `✅ ${url}`);

  // ── CHECK 2: Key format (local, no network) ──
  setCheck('key', 'loading', 'กำลังตรวจสอบ...');
  await delay(200);
  if (!key) {
    setCheck('key', 'fail', '❌ กรุณากรอก API Key');
    return done(false, btn);
  }
  const parts = key.split('.');
  if (parts.length !== 3 || !key.startsWith('eyJ')) {
    setCheck('key', 'fail', '❌ รูปแบบ JWT ไม่ถูกต้อง (ต้องขึ้นต้นด้วย eyJ และมี 3 ส่วน)');
    return done(false, btn);
  }
  try {
    const payload = JSON.parse(atob(parts[1]));
    if (payload.role === 'service_role') {
      setCheck('key', 'warn', '⚠️ นี่คือ service_role key — ควรใช้ anon key แทนเพื่อความปลอดภัย');
    } else {
      setCheck('key', 'pass', `✅ JWT ถูกต้อง (role: ${payload.role || 'unknown'})`);
    }
  } catch {
    setCheck('key', 'pass', '✅ รูปแบบ JWT ถูกต้อง');
  }

  // ── CHECK 3: Ping — ใช้ endpoint ที่ไม่ต้องการ auth ──
  // /rest/v1/ โดยไม่ส่ง header ใดๆ จะบอกว่าเซิร์ฟเวอร์ online ไหม
  setCheck('ping', 'loading', 'กำลังเชื่อมต่อเซิร์ฟเวอร์...');
  const t0 = Date.now();
  let pingStatus = 0;
  try {
    const pingRes = await fetchWithTimeout(`${url}/rest/v1/`, {}, 8000);
    const pingMs = Date.now() - t0;
    pingStatus = pingRes.status;
    // ทุก status ที่ตอบกลับมา = server online (401 ก็แปลว่า server ทำงานอยู่)
    setCheck('ping', 'pass', `✅ เซิร์ฟเวอร์ online (HTTP ${pingStatus}, ${pingMs}ms)`, speedBar(pingMs));
  } catch (err) {
    const pingMs = Date.now() - t0;
    setCheck('ping', 'fail', `❌ ไม่สามารถเชื่อมต่อได้ (${pingMs}ms)`,
      `<div class="check-code">สาเหตุ: ${err.message}\n\nตรวจสอบ:\n• URL ถูกต้องไหม\n• มี internet ไหม\n• Project ถูก pause ไหม (Supabase จะ pause โปรเจกต์ที่ไม่ใช้งาน 7 วัน)</div>`);
    return done(false, btn);
  }

  // ── CHECK 4: Auth — decode JWT payload แทนการยิง network ──
  // วิธีที่แม่นที่สุดคือ decode JWT ดู issuer และ project ref
  // แล้ว verify ด้วยการดึง /rest/v1/items (ซึ่งทำใน check 5 อยู่แล้ว)
  // ดังนั้น check 4 = decode + cross-check project ref กับ URL
  setCheck('auth', 'loading', 'กำลังตรวจสอบ Key...');
  await delay(200);
  try {
    const t1 = Date.now();
    // Decode JWT payload (ไม่ต้องการ network)
    const jwtPayload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
    
    // ดึง project ref จาก URL: https://PROJECTREF.supabase.co
    const projectRef = url.replace('https://', '').replace('.supabase.co', '');
    
    // ตรวจ issuer ใน JWT ว่าตรงกับ project นี้ไหม
    const iss = jwtPayload.iss || '';
    const issRef = iss.replace('https://','').replace('.supabase.co/auth/v1','').replace('.supabase.co','');
    
    const authMs = Date.now() - t1;

    if (iss && issRef && issRef !== projectRef) {
      setCheck('auth', 'fail',
        `❌ Key ไม่ตรงกับ Project นี้ (${authMs}ms)`,
        `<div class="check-code">URL project: ${projectRef}\nKey ออกโดย: ${issRef}\n\nKey นี้เป็นของโปรเจกต์อื่น — คัดลอก key ใหม่จากโปรเจกต์ ${projectRef}</div>`);
      return done(false, btn);
    }

    // ทดสอบจริงด้วย /auth/v1/token endpoint (ไม่ต้อง credentials แค่ดู response)
    const authRes = await fetchWithTimeout(`${url}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'apikey': key,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email: '__test__', password: '__test__' }),
    }, 6000);
    
    const authBody = await authRes.json().catch(() => ({}));
    const authMs2 = Date.now() - t1;

    // 400 = key ถูก แต่ email/password ผิด (ซึ่งถูกต้อง เพราะเราแค่ทดสอบ key)
    // 422 = key ถูก validation error
    // 401 = key ผิดจริงๆ
    if (authRes.status === 400 || authRes.status === 422) {
      setCheck('auth', 'pass', `✅ API Key ถูกต้อง ยืนยันผ่าน auth endpoint (${authMs2}ms)`);
    } else if (authRes.status === 401) {
      const msg = authBody?.message || authBody?.error_description || 'Invalid API key';
      setCheck('auth', 'fail', `❌ API Key ไม่ถูกต้อง`,
        `<div class="check-code">Error: ${msg}\n\nKey ที่ถูกต้องอยู่ที่:\nSettings → API → Legacy anon, service → anon public → Copy</div>`);
      return done(false, btn);
    } else {
      // status อื่นๆ = key น่าจะถูก แต่ endpoint ไม่รองรับ
      setCheck('auth', 'pass', `✅ Key ผ่านการตรวจสอบรูปแบบ (HTTP ${authRes.status})`);
    }
  } catch (err) {
    // ถ้า network error ใน auth check แต่ ping ผ่านแล้ว = key น่าจะถูก ข้ามไป
    setCheck('auth', 'warn', `⚠️ ตรวจสอบ key ผ่าน network ไม่ได้ — จะยืนยันจากตาราง items แทน`);
  }

  // ── CHECK 5: Table items ──
  setCheck('items', 'loading', 'กำลังดึงข้อมูลตาราง...');
  let itemsOk = false;
  try {
    const t2 = Date.now();
    const res = await fetchWithTimeout(`${url}/rest/v1/items?select=id,name,cat&limit=5`, {
      headers: {
        'apikey': key,
        'Authorization': `Bearer ${key}`,
        'Accept': 'application/json',
      }
    }, 6000);
    const ms = Date.now() - t2;
    const body = await res.json().catch(() => null);

    if (res.status === 200 && Array.isArray(body)) {
      itemsOk = true;
      const count = body.length;
      const sample = body.map(x => x.name).join(', ');
      setCheck('items', 'pass',
        `✅ ตาราง items พบ ${count} รายการ (${ms}ms)`,
        count > 0
          ? `<div class="check-code">สินค้า: ${sample}</div>`
          : `<div class="check-code" style="color:var(--amber);">ตารางว่าง — รัน seed data ใน supabase_schema.sql หรือเพิ่มสินค้าใน items.html</div>`
      );
    } else if (res.status === 401) {
      setCheck('items', 'fail', '❌ Key ไม่มีสิทธิ์อ่านตาราง items — ตรวจสอบ RLS Policy',
        `<div class="check-code">ไปที่ Supabase → Table Editor → items → RLS\nเพิ่ม policy: Allow anon select</div>`);
    } else {
      // ตารางไม่มี หรือ schema ยังไม่ได้รัน
      const hint = body?.hint || body?.message || '';
      setCheck('items', 'fail',
        `❌ ไม่พบตาราง items (HTTP ${res.status})`,
        `<div class="check-code">รัน supabase_schema.sql ใน SQL Editor ก่อน\n${hint}</div>`);
    }
  } catch (err) {
    setCheck('items', 'fail', '❌ ' + err.message);
  }

  // ── CHECK 6: Write permission (INSERT test) ──
  setCheck('rls', 'loading', 'ทดสอบสิทธิ์เขียน...');
  await delay(150);
  try {
    // ทดสอบ INSERT แบบ dry-run ด้วย prefer:return=minimal + rollback ไม่ได้ แต่ใช้ count แทน
    const res = await fetchWithTimeout(`${url}/rest/v1/items?select=count`, {
      headers: {
        'apikey': key,
        'Authorization': `Bearer ${key}`,
        'Accept': 'application/json',
        'Prefer': 'count=exact',
      }
    }, 5000);

    if (res.status === 200) {
      const total = res.headers.get('content-range') || '?';
      setCheck('rls', 'pass', `✅ สิทธิ์ครบ — อ่าน/เขียน items ได้ (${total} rows)`);
    } else if (res.status === 401 || res.status === 403) {
      setCheck('rls', 'warn', '⚠️ RLS จำกัดสิทธิ์ — บางฟีเจอร์อาจไม่ทำงาน',
        `<div class="check-code">ตรวจสอบ RLS Policy ใน Supabase → Authentication → Policies</div>`);
    } else {
      setCheck('rls', 'warn', `⚠️ HTTP ${res.status} — ตรวจสอบ RLS Policy`);
    }
  } catch {
    setCheck('rls', 'warn', '⚠️ ทดสอบ RLS timeout — อาจใช้งานได้ปกติ');
  }

  // ── DONE ──
  const criticals = ['url', 'key', 'ping', 'auth'];
  const allCriticalPass = criticals.every(k => results[k] === 'pass' || results[k] === 'warn');
  done(allCriticalPass && itemsOk, btn, url, key);
}

// ── FINALIZE ──────────────────────────────────────────
function done(success, btn, url, key) {
  btn.disabled = false;
  btn.innerHTML = '<i class="ph ph-plugs-connected"></i> ทดสอบอีกครั้ง';

  if (success) {
    setHeader('pass', '✅ เชื่อมต่อสำเร็จ!', 'พร้อมใช้งานแล้ว — คัดลอก config ด้านล่าง');
    if (url && key) showSnippet(url, key);
  } else {
    setHeader('fail', '❌ เชื่อมต่อไม่สำเร็จ', 'ตรวจสอบข้อผิดพลาดด้านบนแล้วลองใหม่อีกครั้ง');
  }
}

// ── CODE SNIPPET ──────────────────────────────────────
function showSnippet(url, key) {
  const masked = key.substring(0, 20) + '...' + key.slice(-6);
  document.getElementById('snippet-code').innerHTML =
    `<span class="tok-cmt">// ใส่ใน buy.html, sell.html, items.html, dashboard.html</span>\n` +
    `<span class="tok-key">const</span> <span class="tok-val">SUPABASE_URL</span>  = <span class="tok-str">'${url}'</span>;\n` +
    `<span class="tok-key">const</span> <span class="tok-val">SUPABASE_ANON</span> = <span class="tok-str">'${key.substring(0,20)}...'</span>;`;

  // Store for copy
  document.getElementById('snippet-card')._fullCode =
    `const SUPABASE_URL  = '${url}';\nconst SUPABASE_ANON = '${key}';`;

  document.getElementById('snippet-card').style.display = 'block';
  document.getElementById('snippet-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copySnippet() {
  const code = document.getElementById('snippet-card')._fullCode;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.innerHTML = '<i class="ph ph-check-bold"></i> คัดลอกแล้ว!';
    setTimeout(() => { btn.innerHTML = '<i class="ph ph-copy"></i> คัดลอก'; }, 2000);
  });
}

// ── UTILS ─────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function fetchWithTimeout(url, opts, timeout) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), timeout);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .finally(() => clearTimeout(id));
}

// Auto-fill from localStorage if previously saved
window.addEventListener('DOMContentLoaded', () => {
  const savedUrl = localStorage.getItem('sb_url');
  const savedKey = localStorage.getItem('sb_key');
  if (savedUrl) document.getElementById('inp-url').value = savedUrl;
  if (savedKey) document.getElementById('inp-key').value = savedKey;
});

// Save to localStorage on input
['inp-url','inp-key'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    localStorage.setItem('sb_url', document.getElementById('inp-url').value.trim());
    localStorage.setItem('sb_key', document.getElementById('inp-key').value.trim());
  });
});
</script>
