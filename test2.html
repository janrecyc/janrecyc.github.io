<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Supabase Connection Tester</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Prompt',sans-serif;
  background:#f3f5fa;
  color:#111827;
  padding:20px;
}

.wrap{
  max-width:700px;
  margin:auto;
}

.card{
  background:white;
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

h1{
  font-size:28px;
  margin-bottom:6px;
}

.sub{
  color:#6b7280;
  margin-bottom:25px;
}

.label{
  font-size:13px;
  font-weight:600;
  margin-bottom:7px;
  display:block;
}

.input{
  width:100%;
  border:none;
  background:#eef2f7;
  padding:14px;
  border-radius:14px;
  font-size:14px;
  margin-bottom:16px;
  outline:none;
}

.input:focus{
  outline:2px solid #7c3aed;
}

.btn{
  width:100%;
  border:none;
  background:#7c3aed;
  color:white;
  padding:15px;
  border-radius:16px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

.btn:disabled{
  opacity:.5;
}

.result{
  margin-top:20px;
}

.item{
  background:white;
  border-radius:16px;
  padding:14px;
  margin-bottom:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.04);
}

.ok{
  border-left:5px solid #22c55e;
}

.fail{
  border-left:5px solid #ef4444;
}

.warn{
  border-left:5px solid #f59e0b;
}

.loading{
  border-left:5px solid #3b82f6;
}

.title{
  font-weight:700;
  margin-bottom:4px;
}

.desc{
  font-size:13px;
  color:#6b7280;
  line-height:1.5;
}

.code{
  margin-top:10px;
  background:#111827;
  color:#d1fae5;
  border-radius:12px;
  padding:12px;
  font-family:monospace;
  font-size:12px;
  overflow:auto;
}

.success-box{
  margin-top:20px;
  background:#111827;
  color:#d1fae5;
  padding:20px;
  border-radius:18px;
  display:none;
}

.copy{
  margin-top:12px;
  border:none;
  background:#22c55e;
  color:white;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}
</style>
</head>
<body>

<div class="wrap">

<div class="card">

<h1>Supabase Tester</h1>
<div class="sub">
ทดสอบการเชื่อมต่อ Supabase แบบแก้บั๊กแล้ว
</div>

<label class="label">Project URL</label>
<input
  id="url"
  class="input"
  placeholder="https://xxxxx.supabase.co"
/>

<label class="label">Anon Key</label>
<input
  id="key"
  class="input"
  placeholder="eyJhbGciOi..."
/>

<button class="btn" id="btn" onclick="runTest()">
ทดสอบการเชื่อมต่อ
</button>

<div class="result" id="result"></div>

<div class="success-box" id="successBox">
<div style="font-weight:700;margin-bottom:10px;">
ใช้ในไฟล์อื่นได้เลย
</div>

<div class="code" id="configCode"></div>

<button class="copy" onclick="copyCode()">
คัดลอก
</button>
</div>

</div>
</div>

<script>

function addResult(type,title,desc,extra=''){
  const el=document.createElement('div');

  el.className=`item ${type}`;

  el.innerHTML=`
    <div class="title">${title}</div>
    <div class="desc">${desc}</div>
    ${extra}
  `;

  document.getElementById('result').appendChild(el);
}

function clearResult(){
  document.getElementById('result').innerHTML='';
}

function delay(ms){
  return new Promise(r=>setTimeout(r,ms));
}

function fetchTimeout(url,opts={},timeout=8000){

  const ctrl=new AbortController();

  const t=setTimeout(()=>{
    ctrl.abort();
  },timeout);

  return fetch(url,{
    ...opts,
    signal:ctrl.signal
  }).finally(()=>{
    clearTimeout(t);
  });
}

function parseJwt(token){

  try{

    const base64=token
      .split('.')[1]
      .replace(/-/g,'+')
      .replace(/_/g,'/');

    return JSON.parse(atob(base64));

  }catch(err){

    return null;
  }
}

async function runTest(){

  const btn=document.getElementById('btn');

  const url=document.getElementById('url').value.trim().replace(/\/$/,'');

  const key=document.getElementById('key').value.trim();

  clearResult();

  document.getElementById('successBox').style.display='none';

  btn.disabled=true;
  btn.innerText='กำลังทดสอบ...';

  // URL

  addResult('loading','ตรวจ URL','กำลังตรวจสอบ');

  await delay(300);

  if(!url){

    addResult('fail','URL ไม่ถูกต้อง','กรุณากรอก URL');

    resetBtn();
    return;
  }

  const urlRegex=/^https:\/\/[a-z0-9-]+\.supabase\.co$/;

  if(!urlRegex.test(url)){

    addResult(
      'fail',
      'URL ไม่ถูกต้อง',
      'ต้องเป็น https://xxxxx.supabase.co'
    );

    resetBtn();
    return;
  }

  addResult('ok','URL ถูกต้อง',url);

  // KEY

  addResult('loading','ตรวจ API KEY','กำลังตรวจสอบ');

  await delay(300);

  if(!key){

    addResult('fail','KEY ว่าง','กรุณากรอก anon key');

    resetBtn();
    return;
  }

  const parts=key.split('.');

  if(parts.length!==3){

    addResult(
      'fail',
      'JWT ไม่ถูกต้อง',
      'KEY ต้องมี 3 ส่วน'
    );

    resetBtn();
    return;
  }

  const payload=parseJwt(key);

  if(payload){

    addResult(
      'ok',
      'JWT ถูกต้อง',
      `role: ${payload.role || 'unknown'}`
    );

  }else{

    addResult(
      'warn',
      'อ่าน JWT ไม่ได้',
      'แต่รูปแบบดูถูกต้อง'
    );
  }

  // SERVER

  addResult(
    'loading',
    'เชื่อมต่อเซิร์ฟเวอร์',
    'กำลัง ping Supabase'
  );

  try{

    const t0=Date.now();

    const res=await fetchTimeout(
      `${url}/rest/v1/`,
      {
        headers:{
          apikey:key,
          Authorization:`Bearer ${key}`
        }
      },
      8000
    );

    const ms=Date.now()-t0;

    if(res.status===401){

      addResult(
        'fail',
        'KEY ไม่ถูกต้อง',
        'Supabase ปฏิเสธ API KEY'
      );

      resetBtn();
      return;
    }

    addResult(
      'ok',
      'เชื่อมต่อสำเร็จ',
      `HTTP ${res.status} • ${ms}ms`
    );

  }catch(err){

    addResult(
      'fail',
      'เชื่อมต่อไม่ได้',
      err.message
    );

    resetBtn();
    return;
  }

  // ITEMS

  addResult(
    'loading',
    'ตรวจตาราง items',
    'กำลังดึงข้อมูล'
  );

  try{

    const res=await fetchTimeout(
      `${url}/rest/v1/items?select=*`,
      {
        headers:{
          apikey:key,
          Authorization:`Bearer ${key}`
        }
      },
      8000
    );

    const txt=await res.text();

    if(res.status===200){

      let data=[];

      try{
        data=JSON.parse(txt);
      }catch{}

      addResult(
        'ok',
        'ตาราง items ใช้งานได้',
        `พบ ${data.length} รายการ`
      );

    }else{

      addResult(
        'fail',
        'ตาราง items มีปัญหา',
        `HTTP ${res.status}`,
        `<div class="code">${txt}</div>`
      );
    }

  }catch(err){

    addResult(
      'fail',
      'ดึง items ไม่ได้',
      err.message
    );
  }

  // SUCCESS

  document.getElementById('successBox').style.display='block';

  const code=
`const SUPABASE_URL='${url}';

const SUPABASE_ANON='${key}';`;

  document.getElementById('configCode').innerText=code;

  window.fullCode=code;

  resetBtn();
}

function copyCode(){

  navigator.clipboard.writeText(window.fullCode);

  alert('คัดลอกแล้ว');
}

function resetBtn(){

  const btn=document.getElementById('btn');

  btn.disabled=false;

  btn.innerText='ทดสอบการเชื่อมต่อ';
}

</script>

</body>
</html>
