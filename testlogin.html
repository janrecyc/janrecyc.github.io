<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Auth Test</title>

<style>
body{
  background:#111;
  color:#0f0;
  font-family:monospace;
  padding:20px;
}

input{
  width:100%;
  max-width:400px;
  padding:12px;
  margin:8px 0;
  background:#000;
  color:#0f0;
  border:1px solid #0f0;
}

button{
  padding:12px 20px;
  margin:5px;
  font-size:16px;
  cursor:pointer;
}

#log{
  margin-top:20px;
  background:#000;
  border:1px solid #0f0;
  padding:15px;
  min-height:300px;
  white-space:pre-wrap;
  overflow:auto;
}
</style>
</head>
<body>

<h1>🔐 Supabase Login Test</h1>

<input id="email" type="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<br>

<button onclick="login()">LOGIN</button>
<button onclick="checkSession()">CHECK SESSION</button>
<button onclick="testItems()">TEST ITEMS</button>
<button onclick="logout()">LOGOUT</button>

<div id="log"></div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'


// ═══════════════════════════════
// CONFIG
// ═══════════════════════════════

const SUPABASE_URL =
'https://dhvbbdcsejtvgilcgpfh.supabase.co'

const SUPABASE_ANON =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRodmJiZGNzZWp0dmdpbGNncGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTEwMTMsImV4cCI6MjA5MzY2NzAxM30.B8TSWtXjf6A-Uq1f_JWf2Ghg2I2pCM2N1PV3r8yBlrs'


// ═══════════════════════════════
// CLIENT
// ═══════════════════════════════

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_ANON
)


// ═══════════════════════════════
// LOG
// ═══════════════════════════════

const logBox = document.getElementById('log')

function log(msg){

  console.log(msg)

  logBox.innerHTML += msg + '\n'

  logBox.scrollTop = logBox.scrollHeight
}


// ═══════════════════════════════
// LOGIN
// ═══════════════════════════════

window.login = async function(){

  const email =
    document.getElementById('email').value.trim()

  const password =
    document.getElementById('password').value.trim()

  log('🔄 LOGIN...')

  const { data, error } =
    await supabase.auth.signInWithPassword({

      email,
      password

    })

  if(error){

    log('❌ LOGIN FAILED')
    log(JSON.stringify(error, null, 2))

    return
  }

  log('✅ LOGIN SUCCESS')

  log('USER:')
  log(JSON.stringify(data.user, null, 2))

  log('ACCESS TOKEN:')
  log(data.session.access_token)

  localStorage.setItem(
    'access_token',
    data.session.access_token
  )
}


// ═══════════════════════════════
// CHECK SESSION
// ═══════════════════════════════

window.checkSession = async function(){

  log('🔄 CHECK SESSION...')

  const { data, error } =
    await supabase.auth.getSession()

  if(error){

    log('❌ SESSION ERROR')
    log(JSON.stringify(error, null, 2))

    return
  }

  if(!data.session){

    log('⚠️ NO SESSION')

    return
  }

  log('✅ SESSION OK')

  log('USER:')
  log(JSON.stringify(data.session.user, null, 2))

  log('ACCESS TOKEN:')
  log(data.session.access_token)
}


// ═══════════════════════════════
// TEST ITEMS TABLE
// ═══════════════════════════════

window.testItems = async function(){

  log('🔄 TEST ITEMS TABLE...')

  const { data, error } = await supabase
    .from('items')
    .select('*')
    .limit(3)

  if(error){

    log('❌ ITEMS FAILED')
    log(JSON.stringify(error, null, 2))

    return
  }

  log('✅ ITEMS SUCCESS')

  log(JSON.stringify(data, null, 2))
}


// ═══════════════════════════════
// LOGOUT
// ═══════════════════════════════

window.logout = async function(){

  log('🔄 LOGOUT...')

  await supabase.auth.signOut()

  localStorage.removeItem('access_token')

  log('✅ LOGOUT SUCCESS')
}


log('🚀 READY')

</script>

</body>
</html>
