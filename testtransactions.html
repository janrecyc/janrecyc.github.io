<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Transactions Test</title>

  <style>
    body{
      background:#111;
      color:#0f0;
      font-family:monospace;
      padding:20px;
    }

    button{
      padding:12px 20px;
      font-size:18px;
      cursor:pointer;
      margin:5px;
    }

    #log{
      margin-top:20px;
      background:#000;
      padding:15px;
      border:1px solid #0f0;
      min-height:300px;
      white-space:pre-wrap;
      overflow:auto;
    }
  </style>
</head>
<body>

<h1>🔥 Supabase Transactions Test</h1>

<button onclick="testConnection()">TEST CONNECTION</button>
<button onclick="loadTransactions()">LOAD TRANSACTIONS</button>
<button onclick="addDemoTransaction()">ADD DEMO TRANSACTION</button>

<div id="log"></div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'


// ═══════════════════════════════
// 🔥 ใส่ค่าจริงตรงนี้
// ═══════════════════════════════

const SUPABASE_URL = 'https://dhvbbdcsejtvgilcgpfh.supabase.co'

const SUPABASE_ANON =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRodmJiZGNzZWp0dmdpbGNncGZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTEwMTMsImV4cCI6MjA5MzY2NzAxM30.B8TSWtXjf6A-Uq1f_JWf2Ghg2I2pCM2N1PV3r8yBlrs'


// ═══════════════════════════════
// CREATE CLIENT
// ═══════════════════════════════

const supabase = createClient(
  SUPABASE_URL,
  SUPABASE_ANON
)


// ═══════════════════════════════
// LOG SYSTEM
// ═══════════════════════════════

const logBox = document.getElementById('log')

function log(msg){

  console.log(msg)

  logBox.innerHTML += msg + '\n'

  logBox.scrollTop = logBox.scrollHeight
}


// ═══════════════════════════════
// TEST CONNECTION
// ═══════════════════════════════

window.testConnection = async function(){

  log('🔄 Testing transactions table...')

  try{

    const { data, error } = await supabase
      .from('transactions')
      .select('*')
      .limit(1)

    if(error){

      log('❌ ERROR')
      log(JSON.stringify(error, null, 2))

      analyzeError(error)

      return
    }

    log('✅ CONNECT SUCCESS')
    log(JSON.stringify(data, null, 2))

  }
  catch(err){

    log('🔥 FATAL ERROR')
    log(err.message)
  }
}



// ═══════════════════════════════
// LOAD TRANSACTIONS
// ═══════════════════════════════

window.loadTransactions = async function(){

  log('📦 Loading transactions...')

  const { data, error } = await supabase
    .from('transactions')
    .select('*')
    .order('id', { ascending:false })

  if(error){

    log('❌ LOAD FAILED')
    log(JSON.stringify(error, null, 2))

    return
  }

  log('✅ TRANSACTIONS LOADED')
  log(JSON.stringify(data, null, 2))
}



// ═══════════════════════════════
// ADD DEMO TRANSACTION
// ═══════════════════════════════

window.addDemoTransaction = async function(){

  log('➕ Adding demo transaction...')

  const payload = {

    type:'buy',

    factory_id:'FAC001',

    factory_name:'โรงงานทองแดง',

    total_kg:120,

    total_amount:14400,

    lines:[
      {
        item:'ทองแดง',
        kg:120,
        price:120
      }
    ]
  }

  const { data, error } = await supabase
    .from('transactions')
    .insert([payload])
    .select()

  if(error){

    log('❌ INSERT FAILED')
    log(JSON.stringify(error, null, 2))

    return
  }

  log('✅ INSERT SUCCESS')
  log(JSON.stringify(data, null, 2))
}



// ═══════════════════════════════
// ERROR ANALYZER
// ═══════════════════════════════

function analyzeError(error){

  const msg = error.message || ''

  if(msg.includes('JWT')){
    log('⚠️ ANON KEY ผิด')
  }

  else if(msg.includes('relation')){
    log('⚠️ ไม่พบ TABLE')
  }

  else if(msg.includes('fetch')){
    log('⚠️ URL ผิด หรือเน็ตมีปัญหา')
  }

  else if(msg.includes('row-level security')){
    log('⚠️ RLS BLOCKED')
    log('👉 ต้องสร้าง POLICY')
  }

  else{
    log('⚠️ UNKNOWN ERROR')
  }
}


log('🚀 READY')

</script>

</body>
</html>
